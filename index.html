<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Medhold">
<meta name="theme-color" content="#e8dcc4">
<title>Medhold</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&family=Caveat:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ============================================================
   MEDHOLD v4 — "Arkivet"
   Designsystem: manila / ink / stamp-red / pencil
   ============================================================ */
:root {
  /* Materials */
  --paper: #f4ecd8;             /* manila konvolutt */
  --paper-light: #faf3e0;       /* arkpapir */
  --paper-deep: #e8dcc4;        /* eldre manila */
  --paper-shadow: #d4c4a4;      /* skygge på manila */
  --paper-edge: #c9b994;        /* kant av manila */
  --carbon: #f0e6cf;            /* lett karbonpapir */

  /* Inks */
  --ink: #1c1612;               /* svart blekk, varmt */
  --ink-soft: #3d342a;          /* tynnere blekk */
  --ink-muted: #6b5d4a;         /* gammel blekk */
  --ink-faint: #9a8b73;         /* falmet */
  --pencil: #5a4f3e;            /* blyant */
  --indigo: #2a3a5c;            /* fyllepenne-blå */
  --indigo-soft: #d8dde8;       /* fyllepenne-vannmerke */

  /* Stamps */
  --stamp-red: #a8392c;         /* oksid-rød, ekte gummistempel */
  --stamp-red-soft: #f0d8d4;
  --stamp-green: #4a6b3e;       /* arkivgrønn */
  --stamp-green-soft: #dde6d4;
  --stamp-amber: #b87a2c;       /* tjeneste-amber */
  --stamp-amber-soft: #f0e0c8;

  /* Lines & rules */
  --rule: #c9b994;              /* lineart */
  --rule-soft: #ddd0b3;
  --rule-dashed: #b8a888;

  /* Typography */
  --display: 'Archivo', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', 'Courier New', monospace;
  --hand: 'Caveat', cursive;

  /* Motion */
  --bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
  --paper-fall: cubic-bezier(0.4, 0.0, 0.2, 1);

  /* Shadows */
  --shadow-paper: 0 1px 2px rgba(28, 22, 18, 0.06), 0 4px 12px rgba(28, 22, 18, 0.08);
  --shadow-paper-deep: 0 2px 4px rgba(28, 22, 18, 0.08), 0 12px 32px rgba(28, 22, 18, 0.16);
  --shadow-stamp: 0 1px 1px rgba(168, 57, 44, 0.2);

  /* Safe area */
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}

@media (prefers-reduced-motion: reduce) {
  :root { --bounce: linear; --paper-fall: linear; }
  *, *::before, *::after {
    animation-duration: 0.01s !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01s !important;
  }
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  height: 100%;
  overflow: hidden;
}

body {
  font-family: var(--display);
  background: #2a2620;
  color: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Standalone mode */
@media (display-mode: standalone), (max-width: 480px) {
  body { background: var(--paper); padding: 0; }
  .device-frame {
    width: 100% !important;
    height: 100dvh !important;
    max-height: none !important;
    border-radius: 0 !important;
    box-shadow: none !important;
  }
  .device-frame::before { display: none !important; }
}

:focus { outline: none; }
:focus-visible {
  outline: 2px solid var(--ink);
  outline-offset: 2px;
  border-radius: 4px;
}

.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}

/* ============================================================
   Phone frame
   ============================================================ */
.device-frame {
  width: 390px;
  height: 844px;
  max-height: calc(100dvh - 32px);
  background: var(--paper);
  border-radius: 48px;
  box-shadow:
    0 0 0 12px #0d0b08,
    0 0 0 13px #2a2620,
    0 30px 80px rgba(0,0,0,0.5);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.device-frame::before {
  content: "";
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: 110px;
  height: 28px;
  background: #0d0b08;
  border-radius: 18px;
  z-index: 100;
}

/* Paper texture — subtle noise */
.device-frame::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  opacity: 0.5;
  background-image:
    radial-gradient(circle at 20% 30%, transparent 0%, rgba(180, 160, 120, 0.04) 50%, transparent 100%),
    radial-gradient(circle at 80% 70%, transparent 0%, rgba(180, 160, 120, 0.05) 50%, transparent 100%);
  mix-blend-mode: multiply;
}

.status-bar {
  height: 44px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  font-size: 13px;
  font-weight: 600;
  font-feature-settings: "tnum";
  color: var(--ink);
  z-index: 10;
  background: var(--paper);
  position: relative;
}

.status-icons { display: flex; gap: 5px; align-items: center; }
.status-icons svg { width: 16px; height: 11px; }

.home-indicator {
  height: 34px;
  flex-shrink: 0;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 8px;
  background: var(--paper);
  z-index: 10;
}
.home-indicator::after {
  content: "";
  width: 134px;
  height: 5px;
  background: var(--ink);
  border-radius: 3px;
  opacity: 0.85;
}

/* Router */
.router {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--paper);
  touch-action: pan-y;
  z-index: 2;
}

.screen {
  position: absolute;
  inset: 0;
  background: var(--paper);
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  transform: translateX(0);
  opacity: 1;
  transition: transform 0.32s var(--paper-fall), opacity 0.32s var(--paper-fall);
  will-change: transform, opacity;
  pointer-events: auto;
}
.screen::-webkit-scrollbar { display: none; }
.screen.entering-from-right { transform: translateX(100%); opacity: 0.3; pointer-events: none; }
.screen.entering-from-left  { transform: translateX(-100%); opacity: 0.3; pointer-events: none; }
.screen.exiting-to-right    { transform: translateX(40%); opacity: 0; pointer-events: none; }
.screen.exiting-to-left     { transform: translateX(-30%); opacity: 0; pointer-events: none; }
</style>
<style>
/* ============================================================
   TYPOGRAPHY
   ============================================================ */
h1, h2, h3, h4 { font-family: var(--display); font-weight: 700; letter-spacing: -0.02em; color: var(--ink); }

/* Display heads — heavy, condensed feeling */
.head-xl {
  font-family: var(--display);
  font-weight: 800;
  font-size: 38px;
  line-height: 0.95;
  letter-spacing: -0.035em;
  color: var(--ink);
}
.head-l {
  font-family: var(--display);
  font-weight: 700;
  font-size: 28px;
  line-height: 1.0;
  letter-spacing: -0.025em;
  color: var(--ink);
}
.head-m {
  font-family: var(--display);
  font-weight: 700;
  font-size: 20px;
  line-height: 1.15;
  letter-spacing: -0.015em;
  color: var(--ink);
}

/* Stamp eyebrow — monospace */
.stamp-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-muted);
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

/* Body */
.body-l { font-size: 16px; line-height: 1.5; color: var(--ink-soft); font-family: var(--display); font-weight: 400; }
.body { font-size: 14px; line-height: 1.55; color: var(--ink-soft); font-family: var(--display); font-weight: 400; }
.body-s { font-size: 13px; line-height: 1.5; color: var(--ink-muted); font-family: var(--display); font-weight: 400; }

/* Hand-written */
.handwriting {
  font-family: var(--hand);
  font-weight: 500;
  letter-spacing: 0;
  color: var(--pencil);
}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-family: var(--display);
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: all 0.15s ease;
  user-select: none;
  text-decoration: none;
  -webkit-appearance: none;
  letter-spacing: -0.005em;
}
.btn:active { transform: scale(0.98); }
.btn[disabled] { opacity: 0.5; pointer-events: none; }

.btn-primary {
  background: var(--ink);
  color: var(--paper-light);
  padding: 17px 22px;
  border-radius: 14px;
  font-size: 15px;
  width: 100%;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.btn-primary:active { background: #0f0a06; }

.btn-secondary {
  background: transparent;
  color: var(--ink);
  padding: 17px 22px;
  border-radius: 14px;
  font-size: 14px;
  width: 100%;
  border: 1.5px solid var(--ink);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.btn-secondary:active { background: var(--paper-deep); }

.btn-ghost {
  background: transparent;
  color: var(--ink-muted);
  padding: 14px 18px;
  border-radius: 12px;
  font-size: 14px;
  width: 100%;
  font-weight: 500;
  border: 1px solid transparent;
}
.btn-ghost:hover { color: var(--ink); }
.btn-ghost:active { color: var(--ink); background: var(--paper-deep); }

.btn-stamp {
  background: var(--stamp-red);
  color: white;
  padding: 17px 22px;
  border-radius: 14px;
  font-size: 15px;
  width: 100%;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.btn-stamp:active { background: #8a2e22; }

/* ============================================================
   POSTMARK (rubber stamp)
   ============================================================ */
.postmark {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 6px 12px;
  border: 1.5px solid var(--stamp-red);
  color: var(--stamp-red);
  border-radius: 4px;
  position: relative;
  background: transparent;
  text-align: center;
  line-height: 1.2;
  filter: blur(0.2px);
  opacity: 0.92;
}
.postmark.tilted { transform: rotate(-3deg); }
.postmark.tilted-r { transform: rotate(2deg); }
.postmark.green { border-color: var(--stamp-green); color: var(--stamp-green); }
.postmark.amber { border-color: var(--stamp-amber); color: var(--stamp-amber); }
.postmark.ink { border-color: var(--ink); color: var(--ink); }

.postmark-circular {
  width: 72px; height: 72px;
  border-radius: 50%;
  border: 2px solid var(--stamp-red);
  color: var(--stamp-red);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  text-align: center;
  line-height: 1.1;
  position: relative;
  flex-shrink: 0;
  filter: blur(0.15px);
  opacity: 0.9;
  transform: rotate(-8deg);
  padding: 8px;
}
.postmark-circular::before {
  content: "";
  position: absolute;
  inset: 5px;
  border: 1px solid currentColor;
  border-radius: 50%;
}
.postmark-circular.green { border-color: var(--stamp-green); color: var(--stamp-green); }
.postmark-circular.large {
  width: 96px; height: 96px; font-size: 10px;
}

@keyframes stamp-down {
  0% { transform: rotate(-8deg) scale(1.4); opacity: 0; }
  60% { transform: rotate(-8deg) scale(0.9); opacity: 0.95; }
  100% { transform: rotate(-8deg) scale(1); opacity: 0.9; }
}
.postmark-circular.animated { animation: stamp-down 0.4s var(--bounce); }

/* ============================================================
   ANIMATIONS
   ============================================================ */
@keyframes paper-down {
  0% { opacity: 0; transform: translateY(-8px) rotate(-1deg); }
  100% { opacity: 1; transform: translateY(0) rotate(0); }
}
@keyframes paper-rise {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes ink-draw {
  to { stroke-dashoffset: 0; }
}
@keyframes pencil-bob {
  0%, 100% { transform: rotate(0deg); }
  50% { transform: rotate(2deg) translateY(-1px); }
}
@keyframes hand-wave {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-2px); }
}
@keyframes spin { to { transform: rotate(360deg); } }

.stagger > * { animation: paper-rise 0.5s var(--paper-fall) backwards; }
.stagger > *:nth-child(1) { animation-delay: 0.05s; }
.stagger > *:nth-child(2) { animation-delay: 0.13s; }
.stagger > *:nth-child(3) { animation-delay: 0.21s; }
.stagger > *:nth-child(4) { animation-delay: 0.29s; }
.stagger > *:nth-child(5) { animation-delay: 0.37s; }
.stagger > *:nth-child(6) { animation-delay: 0.45s; }

/* ============================================================
   APP HEADER
   ============================================================ */
.app-header-row {
  padding: 8px 24px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 52px;
  flex-shrink: 0;
  position: relative;
  z-index: 3;
}

.icon-btn {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 10px;
  cursor: pointer;
  border: none;
  background: transparent;
  position: relative;
  transition: background 0.15s;
}
.icon-btn:active { background: var(--paper-deep); transform: scale(0.94); }
.icon-btn svg { width: 22px; height: 22px; stroke: var(--ink); fill: none; stroke-width: 1.6; }

.icon-btn .badge {
  position: absolute;
  top: 7px; right: 7px;
  width: 8px; height: 8px;
  background: var(--stamp-red);
  border-radius: 50%;
  border: 2px solid var(--paper);
  box-sizing: content-box;
  margin-top: -2px;
  margin-right: -2px;
}

.nav-back-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px 8px 8px;
  border-radius: 100px;
  border: none;
  background: transparent;
  color: var(--ink);
  font-family: var(--display);
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  margin-left: -8px;
  transition: background 0.15s;
}
.nav-back-btn:active { background: var(--paper-deep); }
.nav-back-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2.2; }

.nav-action {
  font-family: var(--display);
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-muted);
  cursor: pointer;
  padding: 8px 4px;
  user-select: none;
  background: transparent;
  border: none;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.nav-action:active { color: var(--ink); }

/* Wordmark — block stamp style */
.brand-stamp {
  display: inline-flex;
  align-items: center;
  font-family: var(--mono);
  font-weight: 700;
  font-size: 13px;
  color: var(--ink);
  letter-spacing: 0;
  padding: 5px 12px;
  border: 1.5px solid var(--ink);
  border-radius: 3px;
  text-transform: uppercase;
  position: relative;
  white-space: nowrap;
}
.brand-stamp::after { display: none; }

.avatar {
  width: 38px; height: 38px;
  border-radius: 4px;
  background: var(--ink);
  color: var(--paper-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.04em;
  cursor: pointer;
  border: none;
  font-family: var(--mono);
  transition: transform 0.15s;
}
.avatar:active { transform: scale(0.94); }

</style>
<style>
/* ============================================================
   ONBOARDING / SPLASH
   ============================================================ */
.onboarding {
  padding: 60px 32px 32px;
  display: flex;
  flex-direction: column;
  height: 100%;
  position: relative;
}

.onboard-stamp-mark {
  width: 100px; height: 100px;
  margin-bottom: 36px;
  position: relative;
}
.onboard-stamp-mark .ring-outer {
  width: 100%; height: 100%;
  border: 2.5px solid var(--ink);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: var(--paper);
  position: relative;
  filter: blur(0.2px);
}
.onboard-stamp-mark .ring-inner {
  width: 76px; height: 76px;
  border: 1px solid var(--ink);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.onboard-stamp-mark svg {
  width: 100%; height: 100%;
  position: absolute;
  inset: 0;
}
.onboard-stamp-mark .stamp-center {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-align: center;
  color: var(--ink);
  line-height: 1.2;
}
.onboard-stamp-mark.tilted { transform: rotate(-6deg); }

.onboard-headline {
  font-family: var(--display);
  font-weight: 800;
  font-size: 42px;
  line-height: 0.98;
  letter-spacing: -0.035em;
  color: var(--ink);
  margin-bottom: 18px;
}
.onboard-headline .underline-hand {
  position: relative;
  white-space: nowrap;
}
.onboard-headline .underline-hand::after {
  content: "";
  position: absolute;
  left: 0; right: 0; bottom: -4px;
  height: 6px;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 8' preserveAspectRatio='none'><path d='M2 5 Q 50 1, 100 4 T 198 3' stroke='%23a8392c' stroke-width='2' fill='none' stroke-linecap='round'/></svg>");
  background-repeat: no-repeat;
  background-size: 100% 100%;
}

.onboard-body {
  font-size: 16px;
  line-height: 1.55;
  color: var(--ink-soft);
  margin-bottom: 36px;
  max-width: 320px;
  font-weight: 400;
}

.onboard-steps {
  list-style: none;
  margin-bottom: 32px;
}
.onboard-steps li {
  padding: 16px 0;
  border-bottom: 1px solid var(--rule-soft);
  display: flex;
  gap: 16px;
  align-items: flex-start;
}
.onboard-steps li:last-child { border-bottom: none; }

.onboard-step-num {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--ink-muted);
  flex-shrink: 0;
  width: 26px;
  border: 1px solid var(--rule);
  border-radius: 50%;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--paper-light);
}

.onboard-step-text {
  font-size: 15px;
  line-height: 1.45;
  color: var(--ink-soft);
  flex: 1;
  padding-top: 3px;
}
.onboard-step-text strong {
  color: var(--ink);
  font-weight: 700;
}

.onboard-actions {
  margin-top: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.onboard-skip {
  text-align: center;
  font-size: 13px;
  color: var(--ink-muted);
  padding: 12px;
  cursor: pointer;
  border: none;
  background: transparent;
  font-family: var(--display);
  font-weight: 500;
}

/* ============================================================
   ONBOARDING V5 — Margit greeting
   ============================================================ */
.onboarding-v5 {
  display: flex;
  flex-direction: column;
  min-height: 100%;
  padding: 0;
  position: relative;
}

.onboard-margit-area {
  position: relative;
  padding: 22px 28px 0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 140px;
}
.onboard-margit-fig {
  width: 100px;
  height: 124px;
  position: relative;
  z-index: 1;
}
.onboard-margit-fig svg { width: 100%; height: 100%; }

.onboard-margit-stamp {
  position: absolute;
  top: 28px;
  right: 50px;
  width: 72px;
  height: 72px;
  color: var(--stamp-red);
  transform: rotate(8deg);
  filter: blur(0.2px);
  opacity: 0.85;
}
.onboard-margit-stamp svg { width: 100%; height: 100%; }

.onboard-content-v5 {
  padding: 14px 28px 12px;
}

.onboard-headline-v5 {
  font-family: var(--display);
  font-weight: 800;
  font-size: 30px;
  line-height: 1;
  letter-spacing: -0.03em;
  color: var(--ink);
  margin-top: 8px;
  margin-bottom: 10px;
}
.onboard-headline-v5 .underline-hand {
  position: relative;

  justify-content: center;
  font-family: var(--mono);
  font-size: 7px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-faint);
  text-align: center;
  line-height: 1.2;
  flex-shrink: 0;
  transform: rotate(-6deg);
  opacity: 0.6;
}

.draft-letter-subject-line {
  font-family: var(--display);
  font-weight: 700;
  font-size: 13px;
  color: var(--ink);
  margin-bottom: 12px;
  letter-spacing: -0.005em;
}

.draft-letter-fade {
  font-family: 'Georgia', serif;
  font-size: 12px;
  line-height: 1.6;
  color: var(--ink-soft);
  position: relative;
  max-height: 60px;
  overflow: hidden;
}
.draft-letter-fade::after {
  content: "";
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 30px;
  background: linear-gradient(transparent, white);
}

/* CTA at bottom of preview — clear "tap to read" affordance */
.draft-letter-cta {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px dashed var(--rule-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink);
}
.draft-letter-cta svg {
  width: 12px;
  height: 12px;
  stroke: currentColor;
}

/* Close button on expanded letter */
.letter-paper-close {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--ink);
  color: var(--paper-light);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s;
  z-index: 5;
  box-shadow: 0 2px 6px rgba(28, 22, 18, 0.2);
}
.letter-paper-close:active { transform: scale(0.9); }
.letter-paper-close svg { width: 14px; height: 14px; stroke: currentColor; }

/* Consent box, redesigned */
.draft-consent-v5 {
  margin: 0 24px;
  padding: 16px 20px;
  background: var(--paper-light);
  border: 1px solid var(--paper-edge);
  border-radius: 10px;
}
.draft-consent-head {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink);
  margin-bottom: 10px;
}
.draft-consent-head svg {
  width: 14px;
  height: 14px;
  color: var(--stamp-green);
}
.draft-consent-list {
  list-style: none;
}
.draft-consent-list li {
  font-family: var(--display);
  font-size: 13px;
  line-height: 1.5;
  color: var(--ink-soft);
  padding: 4px 0 4px 18px;
  position: relative;
}
.draft-consent-list li::before {
  content: "✓";
  position: absolute;
  left: 0;
  color: var(--stamp-green);
  font-weight: 700;
}
.draft-consent-list li strong { color: var(--ink); font-weight: 700; }

/* Sticky send bar — sticks to bottom of viewport while scrolling */
/* Send bar — sticky inside flex column.
   Stays at bottom of viewport while scrolling. */
.draft-send-bar {
  position: sticky;
  bottom: 0;
  padding: 14px 24px 18px;
  background: var(--paper);
  z-index: 30;
  display: flex;
  flex-direction: column;
  gap: 4px;
  box-shadow: 0 -16px 24px -8px rgba(28, 22, 18, 0.12);
}
.draft-send-bar .btn-stamp {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.draft-legal-link {
  text-align: center;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-muted);
  cursor: pointer;
  padding: 4px;
  background: transparent;
  border: none;
  width: 100%;
}
.draft-legal-link:active { color: var(--ink); }

/* ============================================================
   CASE DETAIL V5 — opening a folder
   ============================================================ */
.case-header-v5 {
  position: relative;
  padding: 14px 28px 22px;
  border-bottom: 1px dashed var(--rule-dashed);
  background: var(--paper-light);
  margin: 0 16px;
  border-radius: 4px;
  border: 1px solid var(--paper-edge);
  margin-bottom: 22px;
  box-shadow:
    0 1px 0 var(--paper-edge),
    0 2px 0 -1px var(--paper-deep),
    0 4px 12px rgba(28, 22, 18, 0.06);
}

.case-postmark-v5 {
  position: absolute;
  top: 14px;
  right: 18px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 1.5px solid currentColor;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-weight: 700;

  text-align: center;

  opacity: 0.85;
  pointer-events: none;
  z-index: 2;
  background: transparent;
}
.case-postmark-v5::before {
  content: "";
  position: absolute;
  inset: 4px;
  border: 1px solid currentColor;
  border-radius: 50%;
}
.case-postmark-v5.red { color: var(--stamp-red); }
.case-postmark-v5.green { color: var(--stamp-green); }
.case-postmark-v5.amber { color: var(--stamp-amber); }
.case-postmark-v5.ink { color: var(--ink); opacity: 0.55; }
.case-postmark-v5 .line-1 { font-size: 10px; line-height: 1; }
.case-postmark-v5 .line-2 { font-size: 9px; letter-spacing: 0.06em; }
.case-postmark-v5 .line-3 { font-size: 7px; letter-spacing: 0.06em; }

.case-header-meta {
  padding-right: 76px;
  margin-bottom: 16px;
}
.case-header-ref {
  font-family: var(--mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-muted);
  margin-bottom: 8px;
  font-weight: 700;
}
.case-header-ref-num {
  white-space: nowrap;
}
.case-header-title {
  font-family: var(--display);
  font-weight: 800;
  font-size: 22px;
  line-height: 1.15;
  color: var(--ink);
  letter-spacing: -0.02em;
  margin-bottom: 8px;
  overflow-wrap: break-word;
  hyphens: none;
}
.case-header-opp {
  display: flex;
  gap: 10px;
  align-items: baseline;
}
.case-header-opp-label {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-muted);
}
.case-header-opp-name {
  font-family: var(--display);
  font-weight: 500;
  font-size: 14px;
  color: var(--ink-soft);
}

.case-header-amount-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 14px;
  border-top: 1px dashed var(--rule-dashed);
}
.case-header-amount-label {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-muted);
}
.case-header-amount {
  font-family: var(--mono);
  font-size: 16px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 0.02em;
  border: 1.5px solid var(--ink);
  padding: 4px 10px;
  border-radius: 3px;
}

  text-decoration: line-through;
  color: var(--ink-muted);

/* Margit status banner */
.case-margit-status {
  margin: 0 24px 18px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  padding: 14px 16px;
  background: var(--paper-light);
  border: 1px solid var(--paper-edge);
  border-left: 3px solid currentColor;
  border-radius: 0 10px 10px 0;
  color: var(--ink);
}
.case-margit-status.red { color: var(--stamp-red); }
.case-margit-status.amber { color: var(--stamp-amber); }
.case-margit-status.green { color: var(--stamp-green); }

.case-margit-fig {
  flex-shrink: 0;
  width: 36px;
  height: 44px;
}
.case-margit-fig svg { width: 100%; height: 100%; }
.case-margit-bubble { flex: 1; padding-top: 2px; }
.case-margit-name {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  margin-bottom: 4px;
  color: currentColor;
}
.case-margit-text {
  font-family: var(--display);
  font-size: 14px;
  line-height: 1.45;
  color: var(--ink-soft);
}

/* Action area */
.case-action-v5 {
  padding: 0 24px 22px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* Timeline */
.case-timeline-v5 {
  padding: 6px 28px 8px;
}
.case-timeline-head {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
}
.case-timeline-label {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--ink-muted);
}
.case-timeline-line {
  flex: 1;
  height: 1px;
  background: repeating-linear-gradient(to right, var(--rule-dashed) 0 4px, transparent 4px 8px);
}
.case-timeline-count {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  color: var(--ink-faint);
  letter-spacing: 0.04em;
}

.case-timeline-events {
  display: flex;
  flex-direction: column;
  gap: 0;
  position: relative;
  padding-left: 14px;
}
.case-timeline-events::before {
  content: "";
  position: absolute;
  left: 27px;
  top: 22px;
  bottom: 22px;
  width: 1px;
  background: repeating-linear-gradient(to bottom, var(--rule-dashed) 0 4px, transparent 4px 8px);
}

.case-timeline-evt {
  display: flex;
  gap: 18px;
  align-items: flex-start;
  padding: 14px 0;
  position: relative;
}

.case-timeline-marker {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--paper-light);
  border: 1.5px solid var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink);
  position: relative;
  z-index: 1;
}
.case-timeline-marker svg { width: 14px; height: 14px; }

.case-timeline-evt.sent .case-timeline-marker { 
  background: var(--ink); 
  color: var(--paper-light); 
}
.case-timeline-evt.received .case-timeline-marker { 
  background: var(--stamp-red); 
  color: var(--paper-light); 
  border-color: var(--stamp-red); 
}
.case-timeline-evt.future .case-timeline-marker { 
  background: var(--paper); 
  border-style: dashed; 
  border-color: var(--ink-faint); 
  color: var(--ink-faint); 
}

.case-timeline-content {
  flex: 1;
  padding-top: 1px;
}
.case-timeline-date {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-muted);
  margin-bottom: 4px;
}
.case-timeline-evt.future .case-timeline-date { color: var(--ink-faint); }

.case-timeline-title {
  font-family: var(--display);
  font-weight: 700;
  font-size: 15px;
  color: var(--ink);
  letter-spacing: -0.01em;
  line-height: 1.3;
  margin-bottom: 4px;
}
.case-timeline-evt.future .case-timeline-title {
  color: var(--ink-muted);
  font-weight: 500;
}

.case-timeline-detail {
  font-family: var(--display);
  font-size: 13px;
  line-height: 1.45;
  color: var(--ink-muted);
}
.case-timeline-link {
  background: transparent;
  border: none;
  color: var(--ink);
  text-decoration: underline;
  text-underline-offset: 2px;
  text-decoration-color: var(--rule);
  cursor: pointer;
  font-family: inherit;
  font-size: inherit;
  padding: 0;
  font-weight: 500;
}
.case-timeline-link:active { color: var(--stamp-red); }

.case-stop-v5 {
  margin: 16px 28px 24px;
  padding-top: 20px;
  border-top: 1px dashed var(--rule-dashed);
}
.case-stop-v5 button {
  width: 100%;
  background: transparent;
  border: none;
  font-family: var(--display);
  font-size: 13px;
  color: var(--ink-muted);
  padding: 12px;
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 3px;
  text-decoration-color: var(--rule);
}
.case-stop-v5 button:active { color: var(--stamp-red); }

   PROFILE V5 — personal arkiv card
   ============================================================ */
.profile-card-v5 {

.profile-card-eyebrow {

.profile-card-name {

.profile-card-email {

.profile-card-stats {

.profile-margit-note {

}
.profile-margit-fig {

}

.profile-margit-name {
  font-family: var(--mono);

.profile-section-v5 {
  padding: 0 28px 4px;

}
.profile-section-head {
  display: flex;

}
.profile-section-label {

.toast {

        <path d="M 26 46 C 24 56, 23 66, 24 76 L 46 76 C 47 66, 46 56, 44 46" stroke-width="0.9" fill="${accent}"/>

const STORAGE_KEY = 'medhold_state_v4';

const defaultState = {
  user: null,
  cases: [],
  preferences: { notificationsEnabled: false, reducedMotion: false },
  hasSeenOnboarding: false,
  readNotifications: []
};

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      return { ...defaultState, ...parsed };
    }
  } catch (e) { console.warn('Load fail:', e); }
  return JSON.parse(JSON.stringify(defaultState));
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch (e) { console.warn('Save fail:', e); }
}

function resetState() {
  state = JSON.parse(JSON.stringify(defaultState));
  saveState();
}

function uid() { return 'c_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4); }

function escapeHtml(str) {
  if (str == null) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function formatDate(iso, opts = {}) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  const months = ['jan','feb','mar','apr','mai','jun','jul','aug','sep','okt','nov','des'];
  const monthsLong = ['januar','februar','mars','april','mai','juni','juli','august','september','oktober','november','desember'];
  if (opts.long) return `${d.getDate()}. ${monthsLong[d.getMonth()]} ${d.getFullYear()}`;
  return `${d.getDate()}. ${months[d.getMonth()]}`;
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function daysFromNow(days) {
  const d = new Date();
  d.setDate(d.getDate() + days);
  return d.toISOString();
}

function daysBetween(iso) {
  if (!iso) return 0;
  return Math.ceil((new Date(iso) - new Date()) / (1000 * 60 * 60 * 24));
}

function timeAgo(iso) {
  if (!iso) return '';
  const ms = Date.now() - new Date(iso).getTime();
  const days = Math.floor(ms / (1000 * 60 * 60 * 24));
  const hours = Math.floor(ms / (1000 * 60 * 60));
  const mins = Math.floor(ms / (1000 * 60));
  if (days >= 7) {
    const weeks = Math.floor(days / 7);
    return weeks === 1 ? '1 uke siden' : `${weeks} uker siden`;
  }
  if (days > 0) return days === 1 ? 'i går' : `${days} dager siden`;
  if (hours > 0) return hours === 1 ? '1 time siden' : `${hours} timer siden`;
  if (mins > 0) return mins === 1 ? '1 min siden' : `${mins} min siden`;
  return 'nå';
}

function formatNOK(amount) {
  return amount.toLocaleString('nb-NO', { useGrouping: true }) + ' kr';
}

function formatNOKshort(amount) {
  return amount.toLocaleString('nb-NO') + ',–';
}

function showToast(message, duration = 2200) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toast.classList.remove('show'), duration);
}

function updateClock() {
  const now = new Date();
  const el = document.getElementById('clock');
  if (el) el.textContent = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}
updateClock();
setInterval(updateClock, 30000);

function getInitials(name) {
  if (!name) return '?';
  return name.split(' ').filter(Boolean).map(s => s[0]).join('').slice(0, 2).toUpperCase();
}

function greetingByTime() {
  const h = new Date().getHours();
  if (h < 5) return 'natt';
  if (h < 11) return 'morgen';
  if (h < 17) return 'dag';
  if (h < 21) return 'kveld';
  return 'kveld';
}

function margitUrgentMessage(c) {
  if (c.status === 'needs_decision') {
    if (c.response && c.response.classification === 'rejected_weak') {
      return 'De avviste, men det er ikke over. Vi kan eskalere gratis.';
    }
    if (c.response && c.response.classification === 'accepted') {
      return 'Du fikk medhold. Vi kan avslutte.';
    }
    return 'De har svart. Vi må ta en beslutning sammen.';
  }
  if (c.status === 'high_risk') {
    const days = daysBetween(c.deadline);
    if (days <= 0) return 'Fristen har gått. Du bør betale snart.';
    if (days <= 2) return 'Veldig kort frist. Vi må handle nå.';
    return 'Fristen nærmer seg. La oss se på saken.';
  }
  return 'Det er noe vi bør ta en titt på.';
}

function margitCalmMessage(active, allCases) {
  if (active.length === 0) {
    return 'Ingen aktive saker. Last opp et nytt krav når du har et.';
  }
  if (active.length === 1) {
    return 'Saken er sendt og jeg venter på svar. Du trenger ikke gjøre noe.';
  }
  return 'Alle saker går som de skal. Du trenger ikke gjøre noe i dag.';
}

function fileToDataUrl(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => rej(r.error);
    r.readAsDataURL(file);
  });
}

function formatFileSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(0) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
}

function maskPersonnummer(pn) {
  if (!pn || pn.length < 6) return pn;
  return pn.substring(0, 6) + ' ' + '•'.repeat(Math.max(0, pn.length - 6));
}

function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    return navigator.clipboard.writeText(text).then(() => true).catch(() => false);
  }
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return Promise.resolve(ok);
  } catch (e) { return Promise.resolve(false); }
}

function hapticFeedback(intensity = 'light') {
  if (!navigator.vibrate) return;
  if (intensity === 'light') navigator.vibrate(10);
  else if (intensity === 'medium') navigator.vibrate(20);
  else if (intensity === 'heavy') navigator.vibrate([30, 20, 30]);
}

function createCaseFromAnalysis(analysis, documentImage = null) {
  const now = new Date().toISOString();
  const c = {
    id: uid(),
    documentImage,
    status: 'draft',
    sent: false,
    response: null,
    escalated: false,
    resolvedOutcome: null,
    sentLetter: null,
    createdAt: now,
    updatedAt: now,
    timeline: [{ date: now, title: 'Sak opprettet', detail: 'Margit leste dokumentet og forberedte saken.', type: 'system' }],
    ...analysis
  };
  state.cases.push(c);
  saveState();
  return c;
}

function getCase(id) { return state.cases.find(c => c.id === id); }

function updateCase(id, updates) {
  const c = getCase(id);
  if (!c) return null;
  Object.assign(c, updates);
  c.updatedAt = new Date().toISOString();
  saveState();
  return c;
}

function getSortedCases() {
  const order = { 'needs_decision': 0, 'high_risk': 1, 'awaiting_approval': 2, 'draft': 3, 'active': 4, 'resolved': 5, 'closed': 6 };
  return [...state.cases].sort((a, b) => {
    const pa = order[a.status] ?? 99;
    const pb = order[b.status] ?? 99;
    if (pa !== pb) return pa - pb;
    return new Date(b.updatedAt) - new Date(a.updatedAt);
  });
}

function filterCases(cases, filter) {
  if (filter === 'active') return cases.filter(c => ['needs_decision','high_risk','active','awaiting_approval','draft'].includes(c.status));
  if (filter === 'archive') return cases.filter(c => ['resolved','closed'].includes(c.status));
  return cases;
}

// ============================================================
// NOTIFICATIONS
// ============================================================
function getAllNotifications() {
  const notifs = [];
  state.cases.forEach(c => {
    c.timeline.forEach((ev, idx) => {
      // Only sent/received events become notifications. System events (Sak opprettet,
      // Felter bekreftet, etc.) are internal — they show in case timeline but not
      // as notifications.
      if (ev.type !== 'sent' && ev.type !== 'received') return;
      // Also filter out the "resolved" outcome system events that have been turned
      // into received-style notifications in some flows.
      const id = `${c.id}_${idx}`;
      notifs.push({
        id, caseId: c.id, date: ev.date, title: ev.title, detail: ev.detail || '',
        opponentShort: c.opponent.split(' ')[0],
        read: state.readNotifications && state.readNotifications.includes(id)
      });
    });
    // Add "Sak avsluttet" as a notification when resolved
    if (c.status === 'resolved') {
      const resolvedEvent = c.timeline.find(t => t.title && (t.title.includes('avsluttet') || t.title.includes('Medhold')));
      if (resolvedEvent) {
        const idx = c.timeline.indexOf(resolvedEvent);
        const id = `${c.id}_${idx}_resolved`;
        // Only add if not already present
        if (!notifs.some(n => n.id === id)) {
          notifs.push({
            id, caseId: c.id, date: resolvedEvent.date, 
            title: resolvedEvent.title, 
            detail: resolvedEvent.detail || '',
            opponentShort: c.opponent.split(' ')[0],
            read: state.readNotifications && state.readNotifications.includes(id)
          });
        }
      }
    }
  });
  return notifs.sort((a, b) => new Date(b.date) - new Date(a.date));
}

function getUnreadNotifications() {
  return getAllNotifications().filter(n => !n.read);
}

function markNotificationRead(id) {
  if (!state.readNotifications) state.readNotifications = [];
  if (!state.readNotifications.includes(id)) {
    state.readNotifications.push(id);
    saveState();
  }
}

function markAllNotificationsRead() {
  state.readNotifications = getAllNotifications().map(n => n.id);
  saveState();
}

function groupNotificationsByDate(notifs) {
  const groups = {};
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yesterday = new Date(today.getTime() - 86400000);
  const weekAgo = new Date(today.getTime() - 7*86400000);
  notifs.forEach(n => {
    const d = new Date(n.date);
    let key;
    if (d >= today) key = 'I dag';
    else if (d >= yesterday) key = 'I går';
    else if (d >= weekAgo) key = 'Siste uke';
    else key = 'Tidligere';
    if (!groups[key]) groups[key] = [];
    groups[key].push(n);
  });
  return ['I dag', 'I går', 'Siste uke', 'Tidligere'].filter(k => groups[k]).map(k => ({ label: k, items: groups[k] }));
}

// ROUTER
// ============================================================
const router = {
  history: [],
  currentScreen: null,

  push(name, params = {}) {
    if (this.currentScreen) this.history.push({ name: this.currentScreen.name, params: this.currentScreen.params });
    this._render(name, params, 'forward');
  },

  pop() {
    if (this.history.length === 0) { this._render('home', {}, 'back'); return; }
    const prev = this.history.pop();
    this._render(prev.name, prev.params, 'back');
  },

  replace(name, params = {}) { this._render(name, params, 'replace'); },

  reset(name, params = {}) {
    this.history = [];
    this._render(name, params, 'replace');
  },

  _render(name, params, direction) {
    const routerEl = document.getElementById('router');
    const oldScreen = routerEl.querySelector('.screen');
    const newScreen = document.createElement('div');
    newScreen.className = 'screen';

    const fn = screens[name];
    if (!fn) { console.error(`Unknown screen: ${name}`); return; }

    try { newScreen.innerHTML = fn(params); }
    catch (err) {
      console.error(`Error rendering ${name}:`, err);
      newScreen.innerHTML = `<div style="padding:40px"><p>Feil. <button onclick="router.reset('home')">Tilbake</button></p></div>`;
    }

    if (direction === 'forward') newScreen.classList.add('entering-from-right');
    else if (direction === 'back') newScreen.classList.add('entering-from-left');

    routerEl.appendChild(newScreen);

    void newScreen.offsetWidth;
    requestAnimationFrame(() => {
      newScreen.classList.remove('entering-from-right', 'entering-from-left');
      if (oldScreen) {
        if (direction === 'forward') oldScreen.classList.add('exiting-to-left');
        else if (direction === 'back') oldScreen.classList.add('exiting-to-right');
        else oldScreen.style.opacity = 0;
        setTimeout(() => oldScreen.remove(), 350);
      }
    });

    this.currentScreen = { name, params };
    if (typeof updateFabVisibility === 'function') updateFabVisibility(name);
    if (screens[name + '_mount']) {
      requestAnimationFrame(() => screens[name + '_mount'](params, newScreen));
    }
  }
};

// Swipe-to-back gesture
(function() {
  const routerEl = document.getElementById('router');
  let startX = 0, startY = 0, isTracking = false;
  routerEl.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    if (e.touches[0].clientX > 30) return;
    if (router.history.length === 0) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isTracking = true;
  }, { passive: true });
  routerEl.addEventListener('touchend', e => {
    if (!isTracking) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = Math.abs(e.changedTouches[0].clientY - startY);
    if (dx > 70 && dy < 50) router.pop();
    isTracking = false;
  }, { passive: true });
})();

// FAB visibility
function updateFabVisibility(screenName) {
  const fab = document.getElementById('fab');
  if (!fab) return;
  // Show FAB only when on home AND there are cases (otherwise the big CTA serves as primary action)
  if (screenName === 'home' && state.cases && state.cases.length > 0) fab.classList.remove('hidden');
  else fab.classList.add('hidden');
}

  confirm_mount(params, screenEl) {
    screenEl.querySelectorAll('.field-row').forEach(row => {
      row.addEventListener('click', e => {
        if (e.target.tagName === 'INPUT') return;
        const valueEl = row.querySelector('.field-value');
        const fieldName = row.dataset.field;
        const caseId = row.dataset.caseid;
        if (!valueEl || valueEl.querySelector('input')) return;
        let currentText = valueEl.textContent.trim();
        // For amount fields, strip the "kr" suffix and grouping for editing
        if (fieldName === 'amount') {
          currentText = currentText.replace(/[^\d]/g, '');
        }
        const inputType = fieldName === 'amount' ? 'tel' : 'text';
        const inputMode = fieldName === 'amount' ? 'numeric' : 'text';
        valueEl.innerHTML = `<input type="${inputType}" inputmode="${inputMode}" value="${escapeHtml(currentText)}">`;
        const input = valueEl.querySelector('input');
        input.focus();
        input.select();
        const finish = () => {
          const newVal = input.value.trim();
          updateFieldValue(caseId, fieldName, newVal);
          // Reformat after save
          if (fieldName === 'amount') {
            const c = getCase(caseId);
            valueEl.textContent = formatNOK(c.amount);
          } else {
            valueEl.textContent = newVal;
          }
          if (valueEl.classList.contains('low-conf')) valueEl.classList.remove('low-conf');
        };
        input.addEventListener('blur', finish);
        input.addEventListener('keydown', ev => {
          if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
        });
      });
    });
  },

  draft_mount(params, screenEl) {
    const letter = screenEl.querySelector('#letter-paper');
    const preview = screenEl.querySelector('#letter-preview');
    const closeBtn = screenEl.querySelector('#letter-close');

    const open = () => {
      letter.classList.add('show');
      preview.classList.add('hidden');
      // Scroll letter into view
      setTimeout(() => {
        letter.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
    };
    const close = () => {
      letter.classList.remove('show');
      preview.classList.remove('hidden');
      // Scroll preview into view
      setTimeout(() => {
        preview.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 100);
    };

    if (preview) preview.addEventListener('click', open);
    if (closeBtn) closeBtn.addEventListener('click', close);
  },

  // ============================================================
  // SENT
  // ============================================================
  sent(params) {
    const c = getCase(params.id);
    if (!c) { router.reset('home'); return ''; }
    const ct = CASE_TYPES[c.type];

    return `

  // ============================================================
  // CASE DETAIL
  // ============================================================
  case(params) {
    const c = getCase(params.id);
    if (!c) { router.reset('home'); return ''; }
    const ct = CASE_TYPES[c.type];
    const daysLeft = daysBetween(c.deadline);
    const sentEvent = c.timeline.find(t => t.type === 'sent');
    const daysSinceSent = sentEvent ? Math.floor((Date.now() - new Date(sentEvent.date)) / (1000*60*60*24)) : 0;

    // Margit's status note for this case
    let margitStatusText = '';
    let margitStatusColor = 'ink';
    if (c.status === 'needs_decision') {
      margitStatusText = `${escapeHtml(c.opponent.split(' ')[0])} har svart. Du må ta stilling til hvordan vi går videre.`;
      margitStatusColor = 'red';
    } else if (c.status === 'high_risk') {
      margitStatusText = daysLeft <= 0 ? 'Klagefristen har gått ut. Du bør betale snart.' : `${daysLeft} ${daysLeft === 1 ? 'dag' : 'dager'} igjen til klagefristen.`;
      margitStatusColor = 'amber';
    } else if (c.status === 'active') {
      const sentTimeText = daysSinceSent === 0 ? 'sendt i dag' : `${daysSinceSent} ${daysSinceSent === 1 ? 'dag' : 'dager'} siden`;
      margitStatusText = `Brevet er sendt (${sentTimeText}). Forventet svar: ${ct.responseTimeRange}.`;
    } else if (c.status === 'resolved') {
      margitStatusText = c.resolvedOutcome === 'won' ? 'Saken er vunnet. Beløpet er frafalt.' : (c.resolvedOutcome === 'paid' ? 'Saken er avsluttet. Du har betalt.' : 'Saken er avsluttet.');
      margitStatusColor = 'green';
    } else if (c.status === 'awaiting_approval') {
      margitStatusText = 'Brevet er klart. Les igjennom og send det.';
    } else if (c.status === 'draft') {
      margitStatusText = 'Saken er ikke ferdig opprettet. Fortsett der du slapp.';
    }

    let actionAreaHtml = '';
    if (c.status === 'needs_decision') {
      actionAreaHtml = `
        <div class="case-action-v5">
          <button class="btn btn-primary" data-action="show-nba" data-id="${c.id}">Se valg og ta beslutning</button>
        </div>
      `;
    } else if (c.status === 'high_risk' && c.recommendation === 'high_risk') {
      actionAreaHtml = `
        <div class="case-action-v5">
          <button class="btn btn-primary" data-action="prefer-pay" data-id="${c.id}">Slik betaler du</button>
          <button class="btn btn-ghost" data-action="show-recommendation" data-id="${c.id}">Se vurderingen</button>
        </div>
      `;
    } else if (c.status === 'awaiting_approval') {
      actionAreaHtml = `
        <div class="case-action-v5">
          <button class="btn btn-primary" data-action="show-draft" data-id="${c.id}">Fortsett til godkjenning</button>
        </div>
      `;
    } else if (c.status === 'draft') {
      actionAreaHtml = `
        <div class="case-action-v5">
          <button class="btn btn-primary" data-action="open-case-flow" data-id="${c.id}">Fortsett saksbehandling</button>
        </div>
      `;
    }

    // Postmark for the case header
    let postmarkHtml = '';
    if (c.status === 'resolved' && c.resolvedOutcome === 'won') {
      postmarkHtml = `<div class="case-postmark-v5 green">
        <span class="line-1">★</span>
        <span class="line-2">MEDHOLD</span>
        <span class="line-3">${formatDate(c.updatedAt).toUpperCase()}</span>
        <span class="line-1">★</span>
      </div>`;
    } else if (c.status === 'active' && sentEvent) {
      postmarkHtml = `<div class="case-postmark-v5 ink">
        <span class="line-2">SENDT</span>
        <span class="line-3">${formatDate(sentEvent.date).toUpperCase()}</span>
      </div>`;
    } else if (c.status === 'needs_decision') {
      postmarkHtml = `<div class="case-postmark-v5 red">
        <span class="line-2">SVAR</span>
        <span class="line-3">MOTTATT</span>
      </div>`;
    } else if (c.status === 'high_risk') {
      postmarkHtml = `<div class="case-postmark-v5 amber">
        <span class="line-1">★</span>
        <span class="line-2">HASTER</span>
        <span class="line-1">★</span>
      </div>`;
    }

    return `
      <div class="app-header-row">
        <button class="nav-back-btn" data-action="back">
          <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
          Tilbake
        </button>
        <div></div>
        <button class="nav-action" data-action="show-comm-history" data-id="${c.id}">Brev</button>
      </div>

      <!-- Case header — looks like opening a folder -->
      <div class="case-header-v5">
        ${postmarkHtml}
        <div class="case-header-meta">
          <div class="case-header-ref"><span class="case-header-ref-num">${escapeHtml(c.reference || ct.label)}</span> · <span>${escapeHtml(ct.label)}</span></div>
          <h1 class="case-header-title">${escapeHtml(c.title)}</h1>
          <div class="case-header-opp">
            <span class="case-header-opp-label">Mot</span>
            <span class="case-header-opp-name">${escapeHtml(c.opponent)}</span>
          </div>
        </div>
        <div class="case-header-amount-row">
          <span class="case-header-amount-label">Krav</span>
          <span class="case-header-amount ${c.resolvedOutcome === 'won' ? 'struck' : ''}">${formatNOK(c.amount)}</span>
        </div>
      </div>

      <!-- Margit's status -->
      <div class="case-margit-status ${margitStatusColor}">
        <div class="case-margit-fig">${margitBust({ width: 36, height: 44 })}</div>
        <div class="case-margit-bubble">
          <div class="case-margit-name">MARGIT · ${escapeHtml(timeAgo(c.updatedAt))}</div>
          <div class="case-margit-text">${margitStatusText}</div>
        </div>
      </div>

      ${actionAreaHtml}

      <!-- Timeline -->
      <div class="case-timeline-v5">
        <div class="case-timeline-head">
          <span class="case-timeline-label">SAKSGANG</span>
          <span class="case-timeline-line"></span>
          <span class="case-timeline-count">${c.timeline.length} ${c.timeline.length === 1 ? 'hendelse' : 'hendelser'}</span>
        </div>
        <div class="case-timeline-events">
          ${c.timeline.map((ev, i) => {
            const isLast = i === c.timeline.length - 1;
            const cls = isLast && c.status === 'active' ? 'pending' : 'done';
            const iconType = ev.type === 'sent' ? 'sent' : (ev.type === 'received' ? 'received' : 'system');
            return `
              <div class="case-timeline-evt ${cls} ${iconType}">
                <div class="case-timeline-marker">
                  ${iconType === 'sent' ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>` :
                    iconType === 'received' ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>` :
                    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`}
                </div>
                <div class="case-timeline-content">
                  <div class="case-timeline-date">${formatDate(ev.date, { long: true })}</div>
                  <div class="case-timeline-title">${escapeHtml(ev.title)}</div>
                  ${ev.detail ? `<div class="case-timeline-detail">${ev.detail}${ev.type === 'sent' ? ' <button class="case-timeline-link" data-action="view-sent-letter" data-id="'+c.id+'">Se brevet →</button>' : ''}</div>` : ''}
                </div>
              </div>
            `;
          }).join('')}
          ${c.status === 'active' ? `
            <div class="case-timeline-evt future">
              <div class="case-timeline-marker"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-dasharray="2 2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/></svg></div>
              <div class="case-timeline-content">
                <div class="case-timeline-date">FORVENTET ${ct.responseTimeRange.toUpperCase()}</div>
                <div class="case-timeline-title">${c.escalated ? `Svar fra ${escapeHtml(ct.escalationOrg)}` : `Svar fra ${escapeHtml(c.opponent.split(' ')[0])}`}</div>
                <div class="case-timeline-detail">Vi venter. Du blir varslet.</div>
              </div>
            </div>
          ` : ''}
        </div>
      </div>

      ${(c.status === 'active' || c.status === 'awaiting_approval') ? `
        <div class="case-stop-v5">
          <button data-action="stop-case" data-id="${c.id}">Stopp saken og betal</button>
        </div>
      ` : ''}
      <div style="height: 32px;"></div>
    `;
  },

// ============================================================
// VIEW HELPERS
// ============================================================

function caseFolderHtml(c, isAttention = false) {
  const ct = CASE_TYPES[c.type];
  const daysLeft = daysBetween(c.deadline);
  let attClass = '';
  let statusText = '';

  if (c.status === 'needs_decision') {
    attClass = 'attention';
    statusText = `<strong>Krever beslutning.</strong> ${escapeHtml(c.opponent.split(' ')[0])} har svart.`;
  } else if (c.status === 'high_risk') {
    attClass = 'warn';
    statusText = daysLeft <= 0 ? `<strong>Frist utløpt.</strong> Bør betales.` : `<strong>${daysLeft} ${daysLeft === 1 ? 'dag' : 'dager'} igjen</strong> til klagefristen.`;
  } else if (c.status === 'awaiting_approval') {
    statusText = `Klar til godkjenning`;
  } else if (c.status === 'draft') {
    statusText = `Utkast — ikke fullført`;
  } else if (c.status === 'active') {
    const sentEvent = c.timeline.find(t => t.type === 'sent');
    const sentDays = sentEvent ? Math.floor((Date.now() - new Date(sentEvent.date)) / (1000*60*60*24)) : 0;
    statusText = `Sendt — venter på svar`;
  } else if (c.status === 'resolved') {
    statusText = c.resolvedOutcome === 'won' ? `Medhold — ${formatNOK(c.amount)} spart` : (c.resolvedOutcome === 'paid' ? `Betalt og avsluttet` : `Avsluttet`);
  } else if (c.status === 'closed') {
    statusText = `Avsluttet`;
  }

  // Postmark — circular, like a real rubber stamp
  let postmarkHtml = '';
  if (c.status === 'resolved' && c.resolvedOutcome === 'won') {
    postmarkHtml = `<div class="folder-postmark green" aria-hidden="true">
      <span>★</span><span>MEDHOLD</span><span>★</span>
    </div>`;
  } else if (c.status === 'needs_decision') {
    postmarkHtml = `<div class="folder-postmark red" aria-hidden="true">
      <span>SVAR</span><span>MOTTATT</span>
    </div>`;
  } else if (c.status === 'high_risk') {
    postmarkHtml = `<div class="folder-postmark amber" aria-hidden="true">
      <span>★</span><span>HASTER</span><span>★</span>
    </div>`;
  } else if (c.status === 'active') {
    const sentEvent = c.timeline.find(t => t.type === 'sent');
    const dt = sentEvent ? formatDate(sentEvent.date) : '';
    postmarkHtml = `<div class="folder-postmark ink" aria-hidden="true">
      <span>SENDT</span><span>${dt}</span>
    </div>`;
  } else if (c.status === 'awaiting_approval') {
    postmarkHtml = `<div class="folder-postmark amber" aria-hidden="true">
      <span>UTKAST</span>
    </div>`;
  } else if (c.status === 'resolved' && c.resolvedOutcome === 'paid') {
    postmarkHtml = `<div class="folder-postmark muted" aria-hidden="true">
      <span>BETALT</span>
    </div>`;
  }

  const flow = c.status === 'awaiting_approval' || c.status === 'draft' ? 'open-case-flow' : 'open-case';

  // Format timestamp
  const updatedLabel = timeAgo(c.updatedAt);

  return `
    <button class="case-folder ${attClass}" data-action="${flow}" data-id="${c.id}">
      ${postmarkHtml}
      <div class="case-folder-top">
        <div class="case-ref"><span class="case-ref-num">${escapeHtml(c.reference || ct.label)}</span><span class="case-ref-time"> · ${escapeHtml(updatedLabel)}</span></div>
      </div>
      <div class="case-title">${escapeHtml(c.title)}</div>
      <div class="case-folder-meta">
        <div class="case-opponent">${escapeHtml(c.opponent)}</div>
        <div class="case-amount-stamp ${c.resolvedOutcome === 'won' ? 'struck' : ''}">${formatNOK(c.amount)}</div>
      </div>
      <div class="case-status-row">
        <div class="case-status-text">${statusText}</div>
      </div>
    </button>
  `;
}

function editableFieldRow(name, label, value, extraClass, conf) {

  return `

}

// ============================================================
let pendingUpload = null;

function setAnalysisStep(screen, idx, status) {
  const t = screen.querySelector(`.analysis-task[data-step="${idx}"]`);
  if (!t) return;
  t.classList.remove('active', 'done');
  if (status) t.classList.add(status);
}

async function runAnalysisPipeline(scenarioKey, file, documentImage, screenEl) {
  const stepDuration = 600;
  const steps = [0, 1, 2, 3];
  for (let i = 0; i < steps.length; i++) {
    setAnalysisStep(screenEl, i, 'active');
    await new Promise(r => setTimeout(r, stepDuration));
    setAnalysisStep(screenEl, i, 'done');
    if (i < steps.length - 1) {
      await new Promise(r => setTimeout(r, 120));
    }
  }
  await new Promise(r => setTimeout(r, 350));
  const analysis = await analyzeDocument(file, scenarioKey);
  const c = createCaseFromAnalysis(analysis, documentImage);
  router.replace('confirm', { id: c.id });
}

async function startNewCaseFromFile(file, dataUrl) {
  router.push('analysis', { file, documentImage: dataUrl });
}

async function startNewCaseFromScenario(scenarioKey) {
  router.push('analysis', { scenarioKey });
}

        type: 'system'
      });

    }
  });
}

function updateFieldValue(caseId, fieldName, newValue) {
  const c = getCase(caseId);
  if (!c) return;
  if (fieldName === 'amount') {
    const cleaned = parseInt(String(newValue).replace(/[^\d]/g, ''));
    if (!isNaN(cleaned)) c.amount = cleaned;
  } else {
    c[fieldName] = newValue;
  }
  if (c.fieldConfidence && c.fieldConfidence[fieldName]) {
    c.fieldConfidence[fieldName] = 'high';
  }
  c.updatedAt = new Date().toISOString();
  saveState();
}

function simulateOpponentResponse() {
  const candidates = state.cases.filter(c => c.status === 'active' && !c.response);
  if (candidates.length === 0) {
    showToast('Ingen aktive saker å simulere');
    return;
  }
  const c = candidates[0];
  const outcomes = ['rejected_weak', 'accepted'];
  const outcome = outcomes[Math.floor(Math.random() * outcomes.length)];
  c.response = generateOpponentResponse(c, outcome);
  c.status = 'needs_decision';
  c.timeline.push({
    date: new Date().toISOString(),
    title: `Svar fra ${escapeHtml(c.opponent.split(' ')[0])}`,
    detail: c.response.summary,
    type: 'received'
  });
  saveState();
  showToast(`${c.opponent.split(' ')[0]} svarte`);
  hapticFeedback('medium');
  if (router.currentScreen && router.currentScreen.name === 'home') {
    router.reset('home');
  }
}

document.addEventListener('click', (e) => {
  const target = e.target.closest('[data-action]');
  if (!target) {
    // Handle copyable elements separately
    const copyable = e.target.closest('.copyable');
    if (copyable && copyable.dataset.copy) {
      copyToClipboard(copyable.dataset.copy).then(ok => {
        showToast(ok ? 'Kopiert' : 'Kunne ikke kopiere');
      });
      hapticFeedback('light');
    }
    return;
  }
  const action = target.dataset.action;
  const id = target.dataset.id;

  switch (action) {
    case 'finish-onboarding':
      state.user = state.user || {
        name: 'Eline Hansen',
        email: 'eline.hansen@gmail.com',
        address: 'Markveien 22A, 0554 Oslo',
        phone: '',
        plateNumber: 'EH 84 712',
        personnummer: ''
      };
      state.hasSeenOnboarding = true;
      saveState();
      router.reset('home');
      break;

    case 'onboarding-review':
      closeModal();
      setTimeout(() => router.push('onboarding', { review: true }), 300);
      break;

    case 'new-case':
      router.push('upload');
      break;

    case 'demo-scenario': {
      const sc = target.dataset.scenario;
      startNewCaseFromScenario(sc);
      break;
    }

    case 'back':
      router.pop();
      break;

    case 'back-to-home':
      router.reset('home');
      break;

    case 'open-case':
      router.push('case', { id });
      break;

    case 'open-case-from-sent':
      // Reset history so Back from case goes to home, not sent
      router.reset('home');
      setTimeout(() => router.push('case', { id }), 0);
      break;

    case 'open-case-flow': {
      const c = getCase(id);
      if (!c) break;
      if (c.status === 'draft') router.push('confirm', { id });
      else if (c.status === 'awaiting_approval') router.push('recommendation', { id });
      else router.push('case', { id });
      break;
    }

    case 'open-archive':
      router.push('archive');
      break;

    case 'open-profile':
      router.push('profile');
      break;

    case 'open-notifications':
      router.push('notifications');
      break;

    case 'open-notification': {
      const notifId = target.dataset.notifId;
      const caseId = target.dataset.caseId;
      markNotificationRead(notifId);
      router.push('case', { id: caseId });
      break;
    }

    case 'mark-all-read':
      markAllNotificationsRead();
      router.reset('notifications');
      showToast('Markert som lest');
      break;

    case 'confirm-preview': {
      if (pendingUpload) {
        const { file, dataUrl } = pendingUpload;
        pendingUpload = null;
        router.replace('analysis', { file, documentImage: dataUrl });
      }
      break;
    }

    case 'confirm-case':
      confirmCase(id);
      break;

    case 'show-draft':
      router.push('draft', { id });
      break;

    case 'show-recommendation':
      router.push('recommendation', { id });
      break;

    case 'prefer-pay':
      preferPay(id);
      break;

    case 'confirm-pay':
    case 'mark-paid':
      markPaid(id);
      break;

    case 'confirm-send':
      showSendConfirmModal(id);
      break;

    case 'send-now':
      closeModal();
      setTimeout(() => sendComplaint(id), 200);
      break;

    case 'show-response':
      router.push('response', { id });
      break;

    case 'show-nba':
      router.push('nba', { id });
      break;

    case 'escalate':
      escalateCase(id);
      break;

    case 'accept-and-pay':
      acceptAndPay(id);
      break;

    case 'close-as-won':
      closeAsWon(id);
      break;

    case 'stop-case':
      stopCase(id);
      break;

    case 'view-sent-letter':
      showSentLetterModal(id);
      break;

    case 'show-legal':
      showLegalModal();
      break;

    case 'show-help':
      showHelpModal();
      break;

    case 'show-fields-help':
      showFieldsHelpModal();
      break;

    case 'show-comm-history':
      showCommHistoryModal(id);
      break;

    case 'edit-fact': {
      const key = target.dataset.key;
      const label = target.dataset.label;
      showEditFactModal(key, label);
      break;
    }

    case 'confirm-reset':
      showResetConfirmModal();
      break;

    case 'filter-cases': {
      const f = target.dataset.filter;
      router.reset('home', { filter: f });
      break;
    }
  }
});

// Set caseid on field rows after confirm screen mounts (special case)
document.addEventListener('click', (e) => {
  const screen = e.target.closest('.screen');
  if (!screen) return;
  const fieldRows = screen.querySelectorAll('.field-row[data-caseid=""]');
  if (fieldRows.length > 0 && router.currentScreen?.name === 'confirm') {
    const id = router.currentScreen.params.id;
    fieldRows.forEach(r => r.dataset.caseid = id);
  }
}, true);

// ============================================================
// OFFLINE BANNER
// ============================================================
function updateOfflineBanner() {
  const banner = document.getElementById('offline-banner');
  if (!banner) return;
  if (navigator.onLine) banner.classList.remove('show');
  else banner.classList.add('show');
}
window.addEventListener('online', updateOfflineBanner);
window.addEventListener('offline', updateOfflineBanner);

// ============================================================
// DEMO CONTROLS
// ============================================================
function setupDemoControls() {
  const params = new URLSearchParams(location.search);
  const showDemo = params.has('demo');
  if (showDemo) {
    const dc = document.getElementById('demo-control');
    dc.classList.add('show');
    document.getElementById('demo-respond').addEventListener('click', simulateOpponentResponse);
    document.getElementById('demo-reset').addEventListener('click', () => {
      if (confirm('Slette alt og starte på nytt?')) {
        resetState();
        location.reload();
      }
    });
  }
}

// ============================================================
// BOOT
// ============================================================
function boot() {
  setupDemoControls();
  updateOfflineBanner();
  // Set caseid on field rows whenever the confirm screen renders
  // (handled inside confirm_mount as well, but this is a safety)
  if (!state.user) {
    router.reset('onboarding');
  } else {
    router.reset('home');
  }
}

// Patch confirm_mount to set caseid
const _origConfirmMount = screens.confirm_mount;
screens.confirm_mount = function(params, screenEl) {
  screenEl.querySelectorAll('.field-row').forEach(r => r.dataset.caseid = params.id);
  if (_origConfirmMount) _origConfirmMount(params, screenEl);
};

boot();

</script>
</body>
</html>
