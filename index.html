// ============================================================
// ACTION HANDLERS — central event delegation
// ============================================================

document.addEventListener('click', e => {
  const target = e.target.closest('[data-action]');
  if (!target) return;
  const action = target.dataset.action;
  const id = target.dataset.id;

  switch (action) {
    case 'finish-onboarding':
      state.user = state.user || {
        name: 'Eline Hansen',
        email: 'eline.hansen@gmail.com',
        address: 'Markveien 22A, 0554 Oslo'
      };
      state.hasSeenOnboarding = true;
      saveState();
      router.reset('home');
      break;

    case 'new-case':
      router.push('upload');
      break;

    case 'demo-scenario': {
      const scenarioKey = target.dataset.scenario;
      router.replace('analysis', { scenarioKey });
      break;
    }

    case 'back':
      router.pop();
      break;

    case 'back-to-home':
      router.reset('home');
      break;

    case 'open-case':
      if (id) {
        const c = getCase(id);
        if (c && c.status === 'draft') {
          router.push('confirm', { caseId: id });
        } else {
          router.push('case', { caseId: id });
        }
      }
      break;

    case 'open-case-flow':
      if (id) router.push('confirm', { caseId: id });
      break;

    case 'open-archive':
      router.push('archive');
      break;

    case 'open-profile':
      router.push('profile');
      break;

    case 'confirm-case':
      if (id) {
        const c = getCase(id);
        if (c) c.status = 'awaiting_approval';
        saveState();
        router.push('recommendation', { caseId: id });
      }
      break;

    case 'show-draft':
      if (id) router.push('draft', { caseId: id });
      break;

    case 'prefer-pay':
      if (id) router.push('pay_confirmed', { caseId: id });
      break;

    case 'confirm-pay':
      if (id) router.push('pay_confirmed', { caseId: id });
      break;

    case 'mark-paid':
      if (id) markPaid(id);
      break;

    case 'confirm-send':
      if (id) showSendConfirmModal(id);
      break;

    case 'toggle-letter':
      // handled in draft_mount
      break;

    case 'show-response':
      if (id) router.push('response', { caseId: id });
      break;

    case 'show-nba':
      if (id) router.push('nba', { caseId: id });
      break;

    case 'escalate':
      if (id) escalateCase(id);
      break;

    case 'accept-and-pay':
      if (id) {
        showConfirmModal({
          title: 'Aksepter og betal?',
          body: 'Saken arkiveres når du markerer som betalt. Du kan ikke gjenåpne den.',
          confirmLabel: 'Ja, jeg betaler',
          onConfirm: () => { closeModal(); acceptAndPay(id); }
        });
      }
      break;

    case 'close-as-won':
      if (id) closeAsWon(id);
      break;

    case 'upload-more':
      router.push('upload');
      break;

    case 'stop-case':
      if (id) stopCase(id);
      break;

    case 'view-sent-letter':
      if (id) showSentLetterModal(id);
      break;

    case 'show-legal':
      showLegalModal();
      break;

    case 'show-help':
      showHelpModal();
      break;

    case 'show-fields-help':
      showFieldsHelpModal();
      break;

    case 'contact-human':
      showContactHumanModal();
      break;

    case 'confirm-reset':
      showResetConfirmModal();
      break;

    case 'edit-profile':
    case 'edit-email':
      showToast('Profilredigering kommer snart');
      break;

    // ============================================================
    // V3 ACTIONS
    // ============================================================
    case 'open-notifications':
      router.push('notifications');
      break;

    case 'open-notification': {
      const notifId = target.dataset.notifId;
      const caseId = target.dataset.caseId;
      if (notifId) markNotificationRead(notifId);
      if (caseId) router.push('case', { caseId });
      break;
    }

    case 'mark-all-read':
      markAllNotificationsRead();
      router.replace('notifications');
      showToast('Alle merket som lest');
      break;

    case 'filter-cases': {
      const filter = target.dataset.filter || 'all';
      router.replace('home', { filter });
      break;
    }

    case 'confirm-preview': {
      if (pendingUpload) {
        const { file, dataUrl } = pendingUpload;
        pendingUpload = null;
        startNewCaseFromFile(file, dataUrl);
      } else {
        router.pop();
      }
      break;
    }

    case 'edit-fact': {
      const field = target.dataset.field;
      if (field) showEditFactModal(field);
      break;
    }

    case 'show-comm-history':
      if (id) showCommHistoryModal(id);
      break;

    case 'copy-text': {
      const text = target.dataset.text || target.closest('[data-text]')?.dataset.text;
      if (text) {
        copyToClipboard(text).then(ok => {
          showToast(ok ? 'Kopiert' : 'Klarte ikke kopiere');
          if (ok) hapticFeedback('light');
        });
      }
      break;
    }

    default:
      console.warn('Unknown action:', action);
  }
});
