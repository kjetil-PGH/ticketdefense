<style>
/* ============================================================
   MEDHOLD v2 — Design tokens
   ============================================================ */
:root {
  --paper: #f5f1ea;
  --paper-elevated: #faf7f1;
  --paper-deep: #ebe5d9;
  --ink: #1a1814;
  --ink-soft: #4a463e;
  --ink-muted: #7a7367;
  --ink-faint: #a8a094;
  --rule: #d9d2c3;
  --rule-soft: #e6dfce;

  --accent: #2d5e3e;
  --accent-soft: #e8efe5;
  --accent-deep: #1f4329;

  --warn: #8a4a3a;
  --warn-soft: #f5e3dd;
  --caution: #6b4a1c;
  --caution-soft: #f5e8d8;
  --info: #3a5a7a;
  --info-soft: #e2eaf2;

  --display: 'Fraunces', 'Times New Roman', serif;
  --sans: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'JetBrains Mono', monospace;

  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);

  --shadow-card: 0 1px 2px rgba(26, 24, 20, 0.04), 0 4px 16px rgba(26, 24, 20, 0.06);
  --shadow-elevated: 0 2px 4px rgba(26, 24, 20, 0.06), 0 12px 32px rgba(26, 24, 20, 0.10);
  --shadow-modal: 0 24px 64px rgba(26, 24, 20, 0.18);

  --transition: 0.32s cubic-bezier(0.32, 0.72, 0, 1);
  --transition-fast: 0.18s cubic-bezier(0.32, 0.72, 0, 1);
}

@media (prefers-reduced-motion: reduce) {
  :root { --transition: 0.01s; --transition-fast: 0.01s; }
  *, *::before, *::after {
    animation-duration: 0.01s !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01s !important;
  }
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  height: 100%;
  overflow: hidden;
}

body {
  font-family: var(--sans);
  background: #2a2620;
  color: var(--ink);
  background-image:
    radial-gradient(circle at 20% 10%, rgba(255,255,255,0.02), transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(255,255,255,0.02), transparent 50%);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Standalone PWA mode */
@media (display-mode: standalone), (max-width: 480px) {
  body { background: var(--paper); padding: 0; }
  .device-frame {
    width: 100% !important;
    height: 100dvh !important;
    max-height: none !important;
    border-radius: 0 !important;
    box-shadow: none !important;
  }
  .device-frame::before { display: none !important; }
}

/* Focus styling — visible on keyboard, hidden on touch */
:focus { outline: none; }
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: 8px;
}

/* Screen reader only */
.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}

/* Phone frame */
.device-frame {
  width: 390px;
  height: 844px;
  max-height: calc(100dvh - 32px);
  background: var(--paper);
  border-radius: 48px;
  box-shadow:
    0 0 0 12px #0d0b08,
    0 0 0 13px #2a2620,
    0 30px 80px rgba(0,0,0,0.5);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.device-frame::before {
  content: "";
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: 110px;
  height: 28px;
  background: #0d0b08;
  border-radius: 18px;
  z-index: 100;
}

.status-bar {
  height: 44px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  font-size: 13px;
  font-weight: 600;
  font-feature-settings: "tnum";
  color: var(--ink);
  z-index: 10;
  background: var(--paper);
}

.status-icons { display: flex; gap: 5px; align-items: center; }
.status-icons svg { width: 16px; height: 11px; }

.home-indicator {
  height: 34px;
  flex-shrink: 0;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 8px;
  background: var(--paper);
  z-index: 10;
}
.home-indicator::after {
  content: "";
  width: 134px;
  height: 5px;
  background: var(--ink);
  border-radius: 3px;
  opacity: 0.85;
}

/* Router */
.router {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--paper);
  touch-action: pan-y;
}

.screen {
  position: absolute;
  inset: 0;
  background: var(--paper);
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  transform: translateX(0);
  opacity: 1;
  transition: transform var(--transition), opacity var(--transition);
  will-change: transform, opacity;
  pointer-events: auto;
}
.screen::-webkit-scrollbar { display: none; }
.screen.entering-from-right { transform: translateX(100%); opacity: 0.5; pointer-events: none; }
.screen.entering-from-left  { transform: translateX(-100%); opacity: 0.5; pointer-events: none; }
.screen.exiting-to-right    { transform: translateX(50%); opacity: 0; pointer-events: none; }
.screen.exiting-to-left     { transform: translateX(-30%); opacity: 0; pointer-events: none; }
.screen.modal-enter         { transform: translateY(100%); pointer-events: none; }
.screen.modal-exit          { transform: translateY(100%); opacity: 1; pointer-events: none; }

/* Swipe back indicator */
.swipe-hint {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 12px;
  background: linear-gradient(to right, rgba(26,24,20,0.06), transparent);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
  z-index: 5;
}
.router.can-swipe-back .swipe-hint { opacity: 1; }
</style>
<style>
/* ============================================================

.app-header {

.nav-back {

.nav-back:active { background: var(--paper-deep); transform: scale(0.94); }

.nav-action {

h1.display, h2.display, h3.display {

}
h1.display { font-size: 38px; line-height: 1.04; }
h2.display { font-size: 28px; line-height: 1.1; letter-spacing: -0.02em; }
h3.display { font-size: 20px; line-height: 1.2; letter-spacing: -0.015em; }
h1.display em, h2.display em, h3.display em { font-style: italic; font-weight: 300; color: var(--ink-soft); }

.body-l { font-size: 17px; line-height: 1.5; color: var(--ink-soft); letter-spacing: -0.005em; }
.body { font-size: 15px; line-height: 1.55; color: var(--ink-soft); }
.body-s { font-size: 13px; line-height: 1.5; color: var(--ink-muted); }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: var(--sans);
  font-weight: 500;
  border: none;
  cursor: pointer;
  transition: all 0.15s ease;
  user-select: none;
  text-decoration: none;
  -webkit-appearance: none;
}
.btn:active { transform: scale(0.985); }
.btn[disabled] { opacity: 0.5; pointer-events: none; }

.btn-primary {
  background: var(--ink); color: var(--paper);
  padding: 16px 22px; border-radius: 14px;
  font-size: 16px; width: 100%;
  letter-spacing: -0.01em;
}
.btn-primary:active { background: #2a2620; }

.btn-accent {
  background: var(--accent); color: white;
  padding: 16px 22px; border-radius: 14px;
  font-size: 16px; width: 100%;
  letter-spacing: -0.01em; font-weight: 500;
}
.btn-accent:active { background: var(--accent-deep); }

.btn-secondary {
  background: transparent; color: var(--ink);
  padding: 16px 22px; border-radius: 14px;
  font-size: 15px; width: 100%;
  border: 1px solid var(--rule); font-weight: 500;
}
.btn-secondary:active { background: var(--paper-deep); }

.btn-ghost {
  background: transparent; color: var(--ink-muted);
  padding: 14px 18px; border-radius: 12px;
  font-size: 14px; width: 100%; font-weight: 500;
}
.btn-ghost:active { color: var(--ink); }

.btn-warn {
  background: var(--warn); color: white;
  padding: 16px 22px; border-radius: 14px;
  font-size: 16px; width: 100%; font-weight: 500;
}
.btn-warn:active { background: #6e3a2c; }

/* Status pills */
.status-pill {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 500;
  padding: 4px 10px; border-radius: 100px;
  background: var(--paper-deep); color: var(--ink-soft);
  font-family: var(--sans);
}
.status-pill.active { background: var(--accent-soft); color: var(--accent-deep); }
.status-pill.attention { background: var(--caution-soft); color: var(--caution); }
.status-pill.warn { background: var(--warn-soft); color: var(--warn); }
.status-pill.resolved { background: var(--accent); color: white; }
.status-pill.draft { background: var(--paper-deep); color: var(--ink-soft); }
.status-pill.lost { background: var(--paper-deep); color: var(--ink-muted); }
.status-pill.paid { background: var(--paper-deep); color: var(--ink-muted); }

.status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.status-dot.pulse { animation: pulse 2s ease-in-out infinite; }

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes scaleIn {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* Stagger reveal helper */
.stagger > * { animation: fadeUp 0.5s ease-out backwards; }
.stagger > *:nth-child(1) { animation-delay: 0.05s; }
.stagger > *:nth-child(2) { animation-delay: 0.12s; }
.stagger > *:nth-child(3) { animation-delay: 0.20s; }
.stagger > *:nth-child(4) { animation-delay: 0.28s; }
.stagger > *:nth-child(5) { animation-delay: 0.36s; }
.stagger > *:nth-child(6) { animation-delay: 0.44s; }
.stagger > *:nth-child(7) { animation-delay: 0.52s; }
.stagger > *:nth-child(8) { animation-delay: 0.60s; }

/* ============================================================

   ============================================================ */

.onboard-list li {

}
.onboard-list li:last-child { border-bottom: none; }

.onboard-num {

.onboard-item-text {

.onboard-actions {

.onboard-skip {

}

/* ============================================================
   HOME
   ============================================================ */
.home-hero {

}

.greeting-row {

  background: radial-gradient(circle, var(--accent) 0%, transparent 60%);

  display: flex; justify-content: space-between; align-items: center;

  width: 100%;
  animation: fadeUp 0.6s ease-out 0.6s backwards;
  display: flex; flex-direction: column; gap: 10px;
}

/* Pay confirmed screen — when user accepts our advice to pay */
.pay-confirmed {
  padding: 80px 32px 32px;
  display: flex; flex-direction: column;
  align-items: flex-start;
  height: 100%;
}

.pay-confirmed .icon {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--paper-deep);
  color: var(--ink);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 28px;
}
.pay-confirmed .icon svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; }

.pay-confirmed h1 { margin-bottom: 14px; }
.pay-confirmed .body { margin-bottom: 28px; max-width: 320px; }

.pay-info-card {
  width: 100%;
  background: var(--paper-elevated);
  border: 1px solid var(--rule-soft);
  border-radius: 16px;
  padding: 18px 20px;
  margin-bottom: 28px;
}
.pay-info-card .row {
  display: flex; justify-content: space-between;
  padding: 6px 0;
  font-size: 13px;
}
.pay-info-card .label { color: var(--ink-muted); }
.pay-info-card .value { color: var(--ink); font-weight: 500; font-family: var(--mono); font-size: 12px; }
.pay-info-card .value.amount { font-family: var(--display); font-size: 16px; }

.pay-confirmed .actions {
  margin-top: auto;
  width: 100%;
  display: flex; flex-direction: column; gap: 10px;
}

/* ============================================================
   CASE DETAIL / TIMELINE
   ============================================================ */
.case-detail-header { padding: 4px 28px 24px; border-bottom: 1px solid var(--rule-soft); }

.case-detail-meta {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 16px;
}

.case-detail-opp {
  font-family: var(--mono); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--ink-muted); margin-bottom: 4px;
}

.case-detail-amount {
  font-family: var(--display); font-size: 22px; font-weight: 500;
  color: var(--ink); text-align: right;
  font-feature-settings: "tnum"; letter-spacing: -0.01em;
}

.case-detail-title {
  font-family: var(--display); font-size: 24px; font-weight: 400;
  line-height: 1.15; color: var(--ink);
  letter-spacing: -0.02em; margin-bottom: 16px;
  font-variation-settings: "opsz" 144;
}

.status-callout {
  padding: 16px 18px; background: var(--accent-soft);
  border-radius: 14px;
  display: flex; gap: 14px; align-items: flex-start;
}
.status-callout.attention { background: var(--caution-soft); }
.status-callout.warn { background: var(--warn-soft); }

.status-callout-icon {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--accent); color: white;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.status-callout.attention .status-callout-icon { background: var(--caution); }
.status-callout.warn .status-callout-icon { background: var(--warn); }
.status-callout-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

.status-callout-text { flex: 1; }
.status-callout-text .head {
  font-size: 14px; font-weight: 500;
  margin-bottom: 2px;
}
.status-callout .head { color: var(--accent-deep); }
.status-callout.attention .head { color: var(--caution); }
.status-callout.warn .head { color: var(--warn); }

.status-callout-text .body {
  font-size: 13px;
  opacity: 0.85; line-height: 1.45;
}
.status-callout .body { color: var(--accent-deep); }
.status-callout.attention .body { color: var(--caution); }
.status-callout.warn .body { color: var(--warn); }

.timeline { padding: 24px 28px 8px; position: relative; }

.timeline-section-head {
  font-family: var(--mono); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.14em;
  color: var(--ink-muted); margin-bottom: 20px; font-weight: 500;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.timeline-list { position: relative; padding-left: 28px; }
.timeline-list::before {
  content: ""; position: absolute;
  left: 8px; top: 6px; bottom: 12px;
  width: 1px; background: var(--rule);
}

.timeline-event { position: relative; padding-bottom: 24px; }
.timeline-event::before {
  content: ""; position: absolute;
  left: -24px; top: 6px;
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--paper); border: 1.5px solid var(--ink-faint);
}
.timeline-event.done::before { background: var(--ink); border-color: var(--ink); }
.timeline-event.active::before {
  background: var(--accent); border-color: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-soft);
}
.timeline-event.future::before { background: var(--paper); }

.timeline-date {
  font-family: var(--mono); font-size: 11px;
  color: var(--ink-muted); text-transform: uppercase;
  letter-spacing: 0.06em; margin-bottom: 4px;
}
.timeline-event.future .timeline-date { color: var(--ink-faint); }

.timeline-title {
  font-size: 15px; color: var(--ink); font-weight: 500;
  line-height: 1.35; margin-bottom: 4px;
  letter-spacing: -0.005em;
}
.timeline-event.future .timeline-title { color: var(--ink-muted); font-weight: 400; }

.timeline-detail { font-size: 13px; color: var(--ink-muted); line-height: 1.5; }
.timeline-detail button {
  background: transparent; border: none;
  color: var(--ink-soft); text-decoration: underline;
  text-underline-offset: 2px; text-decoration-color: var(--rule);
  cursor: pointer;
  font-family: var(--sans);
  font-size: inherit;
  padding: 0;
}
.timeline-detail button:active { color: var(--ink); }

/* Case detail action area */
.case-actions {
  padding: 16px 28px 24px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.case-stop-area {
  margin: 16px 28px 24px;
  padding-top: 20px;
  border-top: 1px solid var(--rule-soft);
}
.case-stop-area button {
  width: 100%;
  background: transparent;
  border: none;
  font-family: var(--sans);
  font-size: 13px;
  color: var(--ink-muted);
  padding: 12px;
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 3px;
  text-decoration-color: var(--rule);
}
.case-stop-area button:active { color: var(--warn); }

/* ============================================================
   RESPONSE (motpart har svart)
   ============================================================ */
.response-banner {
  margin: 8px 24px 0;
  padding: 18px 22px;
  background: var(--ink); color: var(--paper);
  border-radius: 18px;
  position: relative; overflow: hidden;
}
.response-banner::before {
  content: ""; position: absolute;
  top: -30%; right: -30%;
  width: 200px; height: 200px;
  background: radial-gradient(circle, var(--warn) 0%, transparent 60%);
  opacity: 0.4; pointer-events: none;
}
.response-banner.win::before {
  background: radial-gradient(circle, var(--accent) 0%, transparent 60%);
  opacity: 0.6;
}
.response-banner-eyebrow {
  font-family: var(--mono); font-size: 11px;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: rgba(245, 241, 234, 0.55);
  margin-bottom: 8px; position: relative;
}
.response-banner-text {
  font-family: var(--display); font-size: 22px; font-weight: 400;
  line-height: 1.2; letter-spacing: -0.015em;
  position: relative;
  font-variation-settings: "opsz" 144;
}
.response-banner-text em { font-style: italic; color: rgba(245, 241, 234, 0.7); font-weight: 300; }

.their-quote { margin: 20px 28px; }
.their-quote-label {
  font-family: var(--mono); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--ink-muted); margin-bottom: 12px;
}
.their-quote-body {
  font-family: var(--display); font-style: italic;
  font-size: 17px; line-height: 1.5;
  color: var(--ink-soft); font-weight: 300;
  padding-left: 16px; border-left: 2px solid var(--rule);
  letter-spacing: -0.005em;
}
.their-quote-attr { margin-top: 12px; font-size: 12px; color: var(--ink-muted); padding-left: 16px; }

.our-analysis {
  margin: 28px 24px 0; padding: 22px;
  background: var(--paper-elevated);
  border: 1px solid var(--rule-soft);
  border-radius: 18px;
}
.analysis-head {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 14px;
}
.analysis-head-icon {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--ink); color: var(--paper);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--display); font-size: 11px; font-weight: 500;
  font-variation-settings: "opsz" 9;
}
.analysis-head-text {
  font-family: var(--mono); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--ink-muted);
}
.our-analysis p {
  font-size: 14px; line-height: 1.6;
  color: var(--ink-soft); margin-bottom: 10px;
}
.our-analysis p:last-child { margin-bottom: 0; }
.our-analysis strong { color: var(--ink); font-weight: 500; }

/* ============================================================
   NBA — Next Best Action
   ============================================================ */
.nba-hero { padding: 16px 28px 24px; }

.nba-options {
  padding: 0 24px;
  display: flex; flex-direction: column; gap: 10px;
}

.nba-option {
  background: var(--paper-elevated);
  border: 1px solid var(--rule-soft);
  border-radius: 18px;
  padding: 20px 22px;
  cursor: pointer; transition: all 0.15s;
  position: relative;
  width: 100%;
  text-align: left;
  font-family: inherit;
  color: inherit;
}
.nba-option:active { border-color: var(--ink); transform: scale(0.99); }

.nba-option.recommended {
  background: var(--ink); color: var(--paper);
  border-color: var(--ink);
}
.nba-option.recommended:active { background: #2a2620; }

.nba-option-badge {
  position: absolute;
  top: 16px; right: 16px;
  font-family: var(--mono); font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.1em;
  padding: 3px 8px; border-radius: 100px;
  background: var(--accent); color: white;
  font-weight: 500;
}

.nba-option-title {
  font-family: var(--display); font-size: 19px; font-weight: 500;
  line-height: 1.2; margin-bottom: 6px;
  padding-right: 80px; letter-spacing: -0.01em;
}

.nba-option-meta {
  font-family: var(--mono); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 12px; opacity: 0.6;
}
.nba-option.recommended .nba-option-meta { color: var(--paper); }
.nba-option:not(.recommended) .nba-option-meta { color: var(--ink-muted); opacity: 1; }

.nba-option-desc { font-size: 13px; line-height: 1.55; opacity: 0.78; }
.nba-option:not(.recommended) .nba-option-desc { color: var(--ink-soft); }

.nba-stats {
  display: flex; gap: 16px;
  margin-top: 14px; padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,0.12);
}
.nba-option:not(.recommended) .nba-stats { border-top-color: var(--rule-soft); }

.nba-stat { flex: 1; }
.nba-stat-label {
  font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.08em; opacity: 0.55; margin-bottom: 2px;
}
.nba-stat-value { font-family: var(--display); font-size: 14px; font-weight: 500; }

/* ============================================================
   RESOLVED
   ============================================================ */
.resolved-wrap { padding: 24px 28px 32px; text-align: left; }

.resolved-mark {
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--accent); color: white;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 28px;
  animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.resolved-mark svg { width: 26px; height: 26px; stroke: currentColor; fill: none; stroke-width: 2.4; }
.resolved-mark.lost { background: var(--paper-deep); color: var(--ink-soft); }
.resolved-mark.paid { background: var(--paper-deep); color: var(--ink-soft); }

.resolved-eyebrow {
  font-family: var(--mono); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.14em;
  margin-bottom: 10px; font-weight: 500;
}
.resolved-eyebrow.won { color: var(--accent); }
.resolved-eyebrow.lost, .resolved-eyebrow.paid { color: var(--ink-muted); }

.resolved-headline {
  font-family: var(--display); font-size: 42px; font-weight: 400;
  line-height: 1.02; letter-spacing: -0.03em;
  color: var(--ink); margin-bottom: 20px;
  font-variation-settings: "opsz" 144;
}
.resolved-headline em { font-style: italic; font-weight: 300; color: var(--ink-soft); }

.resolved-body {
  font-size: 15px; line-height: 1.6;
  color: var(--ink-soft); margin-bottom: 32px;
}

.resolved-celebration {
  margin: 0 0 28px;
  padding: 20px 22px;
  background: var(--accent);
  color: white;
  border-radius: 16px;
  position: relative;
  overflow: hidden;
}
.resolved-celebration::before {
  content: "";
  position: absolute;
  top: -50%; right: -20%;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(255,255,255,0.12), transparent 60%);
  pointer-events: none;
}
.resolved-celebration-amount {
  font-family: var(--display);
  font-size: 38px;
  font-weight: 400;
  line-height: 1;
  letter-spacing: -0.025em;
  font-variation-settings: "opsz" 144;
  position: relative;
}
.resolved-celebration-text {
  font-size: 13px;
  margin-top: 6px;
  opacity: 0.85;
  position: relative;
}

.resolved-summary {
  background: var(--paper-elevated);
  border: 1px solid var(--rule-soft);
  border-radius: 16px; padding: 20px 22px;
  margin-bottom: 28px;
}
.resolved-summary-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid var(--rule-soft);
}
.resolved-summary-row:last-child { border-bottom: none; }
.resolved-summary-label { font-size: 13px; color: var(--ink-muted); }
.resolved-summary-value {
  font-size: 14px; color: var(--ink); font-weight: 500;
  font-feature-settings: "tnum";
}

.feedback-prompt { margin-bottom: 20px; }
.feedback-q {
  font-family: var(--display); font-size: 17px; font-weight: 400;
  margin-bottom: 14px; color: var(--ink); letter-spacing: -0.01em;
}
.rating-stars { display: flex; gap: 6px; margin-bottom: 6px; }
.rating-star {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--rule);
  transition: color 0.15s;
  background: transparent;
  border: none;
}
.rating-star.filled { color: var(--ink); }
.rating-star svg { width: 28px; height: 28px; fill: currentColor; }

/* ============================================================
   PROFILE / SETTINGS
   ============================================================ */
.profile-hero { padding: 12px 28px 28px; border-bottom: 1px solid var(--rule-soft); }

.profile-avatar-large {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--ink);
  color: var(--paper);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 600;
  margin-bottom: 16px;
}

.profile-name {
  font-family: var(--display); font-size: 24px; font-weight: 400;
  letter-spacing: -0.02em; color: var(--ink); margin-bottom: 4px;
}
.profile-email { font-size: 13px; color: var(--ink-muted); font-family: var(--mono); }

.profile-section { padding: 24px 28px; border-bottom: 1px solid var(--rule-soft); }
.profile-section h3 {
  font-family: var(--mono); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.14em;
  color: var(--ink-muted); margin-bottom: 16px; font-weight: 500;
}

.profile-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid var(--rule-soft);
  font-size: 15px;
  cursor: pointer;
  background: transparent;
  border-left: none;
  border-right: none;
  border-top: none;
  width: 100%;
  font-family: inherit;
  color: inherit;
  text-align: left;
}
.profile-row:last-child { border-bottom: none; }
.profile-row .label { color: var(--ink); font-weight: 400; }
.profile-row .value { color: var(--ink-muted); font-size: 14px; }
.profile-row.danger .label { color: var(--warn); }

/* ============================================================
   ARCHIVE
   ============================================================ */
.archive-wrap { padding: 16px 28px; }
.archive-eyebrow { margin-bottom: 12px; }
.archive-list { padding: 0; }

/* ============================================================
   Modal
   ============================================================ */
.modal-overlay {
  position: absolute; inset: 0;
  background: rgba(26, 24, 20, 0.5);
  z-index: 50;
  display: flex; align-items: flex-end;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.modal-overlay.show { opacity: 1; pointer-events: auto; }

.modal-sheet {
  width: 100%;
  background: var(--paper);
  border-radius: 24px 24px 0 0;
  padding: 12px 28px 32px;
  max-height: 80%;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
}
.modal-overlay.show .modal-sheet { transform: translateY(0); }

.modal-handle {
  width: 36px; height: 4px;
  background: var(--rule);
  border-radius: 100px;
  margin: 0 auto 24px;
}

.modal-sheet h3 {
  font-family: var(--display); font-size: 22px; font-weight: 500;
  margin-bottom: 16px; letter-spacing: -0.015em;
}
.modal-sheet h4 {
  font-family: var(--sans); font-size: 14px; font-weight: 500;
  margin: 16px 0 8px; color: var(--ink);
}
.modal-sheet p {
  font-size: 14px; line-height: 1.6;
  color: var(--ink-soft); margin-bottom: 14px;
}
.modal-sheet ul {
  list-style: none; margin: 0 0 16px;
}
.modal-sheet ul li {
  font-size: 14px; line-height: 1.6;
  color: var(--ink-soft); padding-left: 18px;
  position: relative; margin-bottom: 8px;
}
.modal-sheet ul li::before {
  content: "→"; position: absolute; left: 0; color: var(--ink-faint);
}

.modal-summary-card {
  background: var(--paper-elevated);
  border: 1px solid var(--rule-soft);
  border-radius: 14px;
  padding: 14px 18px;
  margin-bottom: 16px;
}
.modal-summary-card .row {
  display: flex; justify-content: space-between;
  padding: 4px 0;
  font-size: 13px;
}
.modal-summary-card .label { color: var(--ink-muted); }
.modal-summary-card .value { color: var(--ink); font-weight: 500; }

.modal-actions {
  display: flex; flex-direction: column; gap: 8px;
  margin-top: 12px;
}

/* Sent letter view (reused as modal content) */
.sent-letter-display {
  background: white;
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 24px 22px;
  font-family: var(--display);
  font-size: 12px;
  line-height: 1.6;
  color: var(--ink);
  box-shadow: 0 1px 2px rgba(26,24,20,0.04);
  margin-top: 8px;
}
.sent-letter-display .meta {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--rule-soft);
}

/* Toast */
.toast {
  position: absolute;
  top: 56px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: var(--ink);
  color: var(--paper);
  padding: 12px 20px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 500;
  z-index: 200;
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
  white-space: nowrap;
  box-shadow: var(--shadow-elevated);
  max-width: calc(100% - 40px);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ============================================================
   v3 — Header icons (bell + avatar)
   ============================================================ */
.app-header-row {
  padding: 8px 24px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 52px;
  flex-shrink: 0;
}

.header-left, .header-right {
  display: flex;
  align-items: center;
  gap: 4px;
}

.icon-btn {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  cursor: pointer;
  border: none;
  background: transparent;
  position: relative;
  transition: background 0.15s;
}
.icon-btn:active { background: var(--paper-deep); transform: scale(0.94); }
.icon-btn svg { width: 20px; height: 20px; stroke: var(--ink); fill: none; stroke-width: 1.8; }

.icon-btn .badge {
  position: absolute;
  top: 7px; right: 7px;
  width: 8px; height: 8px;
  background: var(--warn);
  border-radius: 50%;
  border: 2px solid var(--paper);
  box-sizing: content-box;
  margin-top: -2px;
  margin-right: -2px;
}

/* Pad screens that have the new header */
.has-header .app-header-row + * {
  margin-top: 0;
}

/* ============================================================
   v3 — Floating Action Button
   ============================================================ */
.fab {
  position: absolute;
  bottom: 24px;
  right: 24px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--ink);
  color: var(--paper);
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(26, 24, 20, 0.18), 0 1px 3px rgba(26, 24, 20, 0.12);
  z-index: 30;
  transition: transform 0.15s, box-shadow 0.15s;
}
.fab:active {
  transform: scale(0.94);
  box-shadow: 0 2px 6px rgba(26, 24, 20, 0.18);
}
.fab svg {
  width: 24px;

<script>
/* ============================================================
   MEDHOLD v2 — Application
   ============================================================ */

'use strict';

// ============================================================
// STATE & STORAGE
// ============================================================
const STORAGE_KEY = 'medhold_state_v2';

const defaultState = {
  user: null, // null = not onboarded
  cases: [],
  preferences: {
    notificationsEnabled: false,
    reducedMotion: false
  },
  hasSeenOnboarding: false,
  readNotifications: []
};

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      return { ...defaultState, ...parsed };
    }
  } catch (e) { console.warn('Failed to load state:', e); }
  return JSON.parse(JSON.stringify(defaultState));
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) { console.warn('Failed to save state:', e); }
}

function resetState() {
  state = JSON.parse(JSON.stringify(defaultState));
  saveState();
}

// ============================================================
// HELPERS
// ============================================================
function uid() { return 'c_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4); }

function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function formatDate(iso, opts = {}) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  const months = ['jan', 'feb', 'mar', 'apr', 'mai', 'jun', 'jul', 'aug', 'sep', 'okt', 'nov', 'des'];
  const monthsLong = ['januar','februar','mars','april','mai','juni','juli','august','september','oktober','november','desember'];
  if (opts.long) return `${d.getDate()}. ${monthsLong[d.getMonth()]} ${d.getFullYear()}`;
  return `${d.getDate()}. ${months[d.getMonth()]}`;
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  const h = d.getHours().toString().padStart(2, '0');
  const m = d.getMinutes().toString().padStart(2, '0');
  return `${h}:${m}`;
}

function daysFromNow(days) {
  const d = new Date();
  d.setDate(d.getDate() + days);
  return d.toISOString();
}

function daysBetween(iso) {
  if (!iso) return 0;
  const target = new Date(iso);
  const now = new Date();
  return Math.ceil((target - now) / (1000 * 60 * 60 * 24));
}

function timeAgo(iso) {
  if (!iso) return '';
  const ms = Date.now() - new Date(iso).getTime();
  const days = Math.floor(ms / (1000 * 60 * 60 * 24));
  const hours = Math.floor(ms / (1000 * 60 * 60));
  const mins = Math.floor(ms / (1000 * 60));
  if (days > 0) return `${days} dag${days === 1 ? '' : 'er'} siden`;
  if (hours > 0) return `${hours} time${hours === 1 ? '' : 'r'} siden`;
  if (mins > 0) return `${mins} min siden`;
  return 'nettopp';
}

function formatNOK(amount) {
  return amount.toLocaleString('nb-NO', { useGrouping: true }) + ' kr';
}

function showToast(message, duration = 2500) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toast.classList.remove('show'), duration);
}

// Live clock
function updateClock() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2, '0');
  const m = now.getMinutes().toString().padStart(2, '0');
  const el = document.getElementById('clock');
  if (el) el.textContent = `${h}:${m}`;
}
updateClock();
setInterval(updateClock, 30000);

// Initials
function getInitials(name) {
  if (!name) return '?';
  return name.split(' ').filter(Boolean).map(s => s[0]).join('').slice(0, 2).toUpperCase();
}

function createCaseFromAnalysis(analysisResult, documentImage = null) {
  const now = new Date().toISOString();
  const newCase = {
    id: uid(),
    documentImage: documentImage,
    status: 'draft',
    sent: false,
    response: null,
    escalated: false,
    resolvedOutcome: null,
    sentLetter: null,
    createdAt: now,
    updatedAt: now,
    timeline: [
      { date: now, title: 'Sak opprettet', detail: 'Vi leste dokumentet og forberedte saken.', type: 'system' }
    ],
    ...analysisResult
  };
  state.cases.push(newCase);
  saveState();
  return newCase;
}

function getCase(id) {
  return state.cases.find(c => c.id === id);
}

function updateCase(id, updates) {
  const c = getCase(id);
  if (!c) return null;
  Object.assign(c, updates);
  c.updatedAt = new Date().toISOString();
  saveState();
  return c;
}

function addTimelineEvent(caseId, event) {
  const c = getCase(caseId);
  if (!c) return;
  c.timeline.push({ date: new Date().toISOString(), ...event });
  c.updatedAt = new Date().toISOString();
  saveState();
}

function deleteCase(id) {
  state.cases = state.cases.filter(c => c.id !== id);
  saveState();
}

// Sort cases for home screen by priority
function getSortedCases() {
  const priorityOrder = {
    'needs_decision': 0,
    'high_risk': 1,
    'awaiting_approval': 2,
    'draft': 3,
    'active': 4,
    'resolved': 5,
    'closed': 6
  };

  return [...state.cases].sort((a, b) => {
    const pa = priorityOrder[a.status] ?? 99;
    const pb = priorityOrder[b.status] ?? 99;
    if (pa !== pb) return pa - pb;
    return new Date(b.updatedAt) - new Date(a.updatedAt);
  });
}

function fileToDataUrl(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = () => res(reader.result);
    reader.onerror = () => rej(reader.error);
    reader.readAsDataURL(file);
  });
}

// ROUTER
// ============================================================

const router = {
  history: [],
  currentScreen: null,

  push(name, params = {}) {
    if (this.currentScreen) {
      this.history.push({ name: this.currentScreen.name, params: this.currentScreen.params });
    }
    this._render(name, params, 'forward');
  },

  pop() {
    if (this.history.length === 0) {
      this._render('home', {}, 'back');
      return;
    }
    const prev = this.history.pop();
    this._render(prev.name, prev.params, 'back');
  },

  replace(name, params = {}) {
    this._render(name, params, 'replace');
  },

  reset(name, params = {}) {
    this.history = [];
    this._render(name, params, 'replace');
  },

  _render(name, params, direction) {
    const routerEl = document.getElementById('router');
    const oldScreen = routerEl.querySelector('.screen');
    const newScreen = document.createElement('div');
    newScreen.className = 'screen';

    const screenFn = screens[name];
    if (!screenFn) { console.error(`Unknown screen: ${name}`); return; }

    try {
      newScreen.innerHTML = screenFn(params);
    } catch (err) {
      console.error(`Error rendering ${name}:`, err);
      newScreen.innerHTML = `<div style="padding:40px"><p>Feil ved lasting av skjerm. <button onclick="router.reset('home')">Tilbake</button></p></div>`;
    }

    if (direction === 'forward') newScreen.classList.add('entering-from-right');
    else if (direction === 'back') newScreen.classList.add('entering-from-left');

    routerEl.appendChild(newScreen);

    void newScreen.offsetWidth;
    requestAnimationFrame(() => {
      newScreen.classList.remove('entering-from-right', 'entering-from-left');

      if (oldScreen) {
        if (direction === 'forward') oldScreen.classList.add('exiting-to-left');
        else if (direction === 'back') oldScreen.classList.add('exiting-to-right');
        else oldScreen.style.opacity = 0;
        setTimeout(() => oldScreen.remove(), 350);
      }
    });

    this.currentScreen = { name, params };

    // Hide swipe hint on home (nothing to go back to)
    routerEl.classList.toggle('can-swipe-back', this.history.length > 0);

    // Update FAB visibility
    if (typeof updateFabVisibility === 'function') updateFabVisibility(name);

    // Mount hooks
    if (screens[name + '_mount']) {
      requestAnimationFrame(() => screens[name + '_mount'](params, newScreen));
    }
  }
};

// Swipe-to-back gesture
(function() {
  const routerEl = document.getElementById('router');
  let startX = 0, startY = 0, isTracking = false;

  routerEl.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    if (e.touches[0].clientX > 30) return; // only edge swipes
    if (router.history.length === 0) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isTracking = true;
  }, { passive: true });

  routerEl.addEventListener('touchend', e => {
    if (!isTracking) return;
    const endX = e.changedTouches[0].clientX;
    const endY = e.changedTouches[0].clientY;
    const dx = endX - startX;
    const dy = Math.abs(endY - startY);
    if (dx > 70 && dy < 50) {
      router.pop();
    }
    isTracking = false;
  }, { passive: true });
})();

  confirm_mount(params, screen) {
    // Wire up field editing
    const fieldList = screen.querySelector('#field-list');
    if (!fieldList) return;
    fieldList.addEventListener('click', e => {
      const row = e.target.closest('.field-row');
      if (!row || row.classList.contains('editing')) return;
      const fieldName = row.dataset.field;
      if (!fieldName) return;

      // Skip date/non-text fields for simplicity in this prototype
      if (['issuedDate', 'deadline', 'type'].includes(fieldName)) {
        showToast('Feltet kan ikke endres her');
        return;
      }

      const valueEl = row.querySelector('.field-value');
      const currentText = valueEl.textContent.trim();
      row.classList.add('editing');

      // Get raw value (strip formatting for amount)
      let rawValue = currentText;
      if (fieldName === 'amount') {
        rawValue = currentText.replace(/[^\d]/g, '');
      }

      valueEl.innerHTML = `<input type="text" value="${escapeHtml(rawValue)}" autofocus>`;
      const input = valueEl.querySelector('input');
      input.focus();
      input.select();

      const finishEdit = () => {
        const newValue = input.value.trim();
        if (newValue) {
          updateFieldValue(params.caseId, fieldName, newValue);
        }
        // Re-render whole confirm screen for simplicity
        router.replace('confirm', { caseId: params.caseId });
      };

      input.addEventListener('blur', finishEdit);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') input.blur();
        if (e.key === 'Escape') {
          router.replace('confirm', { caseId: params.caseId });
        }
      });
    });
  },

    if (!state.user) return screens.home();
    const letter = generateComplaintLetter(c, state.user);
    if (!letter) return screens.home();

    return `
      <div class="app-header">
        <button class="nav-back" data-action="back" aria-label="Tilbake">
          <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
      </div>

      <div class="draft-intro">
        <div class="eyebrow" style="margin-bottom: 12px;">Steg 2 av 2 · Godkjenning</div>
        <h2 class="display">Vi har skrevet <em>klagen din.</em></h2>
      </div>

      <div class="letter-summary">
        <div class="letter-summary-label">Sammendrag</div>
        <div class="letter-summary-text">${escapeHtml(letter.summary)}</div>
        <ul class="letter-summary-points">
          ${letter.summaryPoints.map(p => `<li>${escapeHtml(p)}</li>`).join('')}
        </ul>
        <button class="letter-toggle" data-action="toggle-letter" id="letter-toggle">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
          <span>Les hele klagen</span>
        </button>
      </div>

      <div class="letter-paper" id="letter-paper">
        <div class="letter-header">
          <div class="letter-from">
            ${escapeHtml(letter.from.name)}<br>
            ${escapeHtml(letter.from.address || '').split(', ').join('<br>')}
          </div>
          <div class="letter-to">
            <strong>${escapeHtml(letter.to.name)}</strong>
            ${escapeHtml(letter.to.dept)}<br>
            ${escapeHtml(letter.to.email)}
          </div>
        </div>

        <div class="letter-subject">
          ${escapeHtml(letter.subject)}<span class="ref">— ${escapeHtml(letter.reference)}</span>
        </div>

        <div class="letter-body">
          ${letter.paragraphs.map(p => {
            if (typeof p === 'object' && p.type === 'bullets') {
              return `<div class="bullets">${p.items.map(item => `— ${escapeHtml(item)}`).join('<br>')}</div>`;
            }
            return `<p>${escapeHtml(p)}</p>`;
          }).join('')}
        </div>

        <div class="letter-signature">
          Med vennlig hilsen
          <strong>${escapeHtml(letter.from.name)}</strong>
          ${escapeHtml(letter.from.email)}
        </div>
      </div>

      <div class="consent-panel">
        <div class="consent-title">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Slik sender vi klagen
        </div>
        <ul class="consent-points">
          <li>Klagen sendes på e-post i ditt navn</li>
          <li>${escapeHtml(c.opponent.split(' ')[0])}s svar går til oss — vi varsler deg</li>
          <li>Du kan stoppe saken når som helst</li>
          <li>Vi gir aldri ut din kontaktinformasjon til andre</li>
        </ul>
        <div class="consent-from">Avsender: <strong>${escapeHtml(letter.from.email)}</strong></div>
      </div>

      <div class="draft-actions">
        <button class="btn btn-accent" data-action="confirm-send" data-id="${c.id}">Send i mitt navn</button>
        <button class="legal-link" data-action="show-legal">Hva betyr dette juridisk?</button>
      </div>
    `;
  },

  draft_mount(params, screen) {
    // Toggle full letter
    const toggle = screen.querySelector('#letter-toggle');
    const paper = screen.querySelector('#letter-paper');
    if (toggle && paper) {
      toggle.addEventListener('click', () => {
        const showing = paper.classList.toggle('show');
        toggle.classList.toggle('open', showing);
        toggle.querySelector('span').textContent = showing ? 'Skjul klagen' : 'Les hele klagen';
        if (showing) {
          setTimeout(() => paper.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
        }
      });
    }
  },

  // ============================================================
  // SENT
  // ============================================================
  sent(params) {
    const c = getCase(params.caseId);
    if (!c) return screens.home();
    const ct = CASE_TYPES[c.type];

    return `
      <div class="sent-screen">
        <div class="sent-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h1 class="sent-headline">Klagen er sendt <em>i ditt navn.</em></h1>
        <p class="sent-body">Vi sjekker innboksen din automatisk. Du får varsel så snart ${escapeHtml(c.opponent.split(' ')[0])} svarer — vanligvis innen ${ct.typicalResponseDays} dager.</p>

        <div class="sent-summary-card">
          <div class="sent-summary-row"><span>Sendt til</span><span class="v">${escapeHtml(c.opponentEmail)}</span></div>
          <div class="sent-summary-row"><span>Saksnummer</span><span class="v">${escapeHtml(c.reference)}</span></div>
          <div class="sent-summary-row"><span>Forventet svar</span><span class="v">~ ${formatDate(daysFromNow(ct.typicalResponseDays))}</span></div>
        </div>

        <div class="sent-actions">
          <button class="btn btn-primary" data-action="open-case" data-id="${c.id}">Følg saken</button>
          <button class="btn btn-ghost" data-action="back-to-home">Tilbake til oversikten</button>
        </div>
      </div>
    `;
  },

  // ============================================================
  // CASE DETAIL / TIMELINE
  // ============================================================
  case(params) {
    const c = getCase(params.caseId);
    if (!c) return screens.home();
    const ct = CASE_TYPES[c.type];

    let calloutHtml = '';
    let actionsHtml = '';

    if (c.status === 'active') {
      calloutHtml = `
        <div class="status-callout">
          <div class="status-callout-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </div>
          <div class="status-callout-text">
            <div class="head">Vi venter på svar fra ${escapeHtml(c.opponent.split(' ')[0])}</div>
            <div class="body">Vanligvis ${ct.typicalResponseDays} dager. Du trenger ikke gjøre noe — vi varsler deg.</div>
          </div>
        </div>
      `;
    } else if (c.status === 'needs_decision') {
      calloutHtml = `
        <div class="status-callout attention">
          <div class="status-callout-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
          </div>
          <div class="status-callout-text">
            <div class="head">Motpart har svart — vi anbefaler å eskalere</div>
            <div class="body">Vi har skrevet eskaleringsklagen. 30 sekunder å godkjenne.</div>
          </div>
        </div>
      `;
      actionsHtml = `
        <div class="case-actions">
          <button class="btn btn-primary" data-action="show-response" data-id="${c.id}">Se svaret og vår analyse</button>
        </div>
      `;
    } else if (c.status === 'resolved') {
      const lastEvent = c.timeline[c.timeline.length - 1];
      calloutHtml = `
        <div class="status-callout">
          <div class="status-callout-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="status-callout-text">
            <div class="head">Sak avsluttet — ${c.resolvedOutcome === 'won' ? 'du fikk medhold' : c.resolvedOutcome === 'paid' ? 'betalt og lukket' : 'avsluttet'}</div>
            <div class="body">${formatDate(lastEvent.date, { long: true })}</div>
          </div>
        </div>
      `;
    } else if (c.status === 'high_risk') {
      calloutHtml = `
        <div class="status-callout warn">
          <div class="status-callout-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
          </div>
          <div class="status-callout-text">
            <div class="head">Frist er utløpt</div>
            <div class="body">Vi anbefaler å betale for å unngå inkasso.</div>
          </div>
        </div>
      `;
      actionsHtml = `
        <div class="case-actions">
          <button class="btn btn-primary" data-action="confirm-pay" data-id="${c.id}">Betal nå</button>
        </div>
      `;
    } else if (c.status === 'draft') {
      actionsHtml = `
        <div class="case-actions">
          <button class="btn btn-primary" data-action="open-case-flow" data-id="${c.id}">Fortsett saken</button>
        </div>
      `;
    }

    // Timeline events
    const timelineEventsHtml = c.timeline.map(ev => `
      <div class="timeline-event done">
        <div class="timeline-date">${formatDate(ev.date)} · ${formatTime(ev.date)}</div>
        <div class="timeline-title">${escapeHtml(ev.title)}</div>
        ${ev.detail ? `<div class="timeline-detail">${ev.detail}</div>` : ''}
        ${ev.viewSentLetter ? `<div class="timeline-detail"><button data-action="view-sent-letter" data-id="${c.id}">Se klagen som ble sendt →</button></div>` : ''}
      </div>
    `).join('');

    let futureEventsHtml = '';
    if (c.status === 'active') {
      futureEventsHtml = `
        <div class="timeline-event active">
          <div class="timeline-date">Forventet ${formatDate(daysFromNow(ct.typicalResponseDays))}</div>
          <div class="timeline-title">${escapeHtml(c.opponent.split(' ')[0])} svarer</div>
          <div class="timeline-detail">Vi sender deg varsel når svar er mottatt.</div>
        </div>
        <div class="timeline-event future">
          <div class="timeline-date">Avhenger av svar</div>
          <div class="timeline-title">Vi vurderer svaret</div>
        </div>
        <div class="timeline-event future">
          <div class="timeline-date">—</div>
          <div class="timeline-title">Sak avsluttet</div>
        </div>
      `;
    } else if (c.status === 'needs_decision') {
      futureEventsHtml = `
        <div class="timeline-event future">
          <div class="timeline-date">Hvis du eskalerer</div>
          <div class="timeline-title">Eskalering til ${escapeHtml(ct.escalationOrg)}</div>
        </div>
        <div class="timeline-event future">
          <div class="timeline-date">—</div>
          <div class="timeline-title">Sak avsluttet</div>
        </div>
      `;
    }

    const statusPill = getStatusPill(c);

    return `
      <div class="app-header">
        <button class="nav-back" data-action="back" aria-label="Tilbake">
          <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
      </div>

      <div class="case-detail-header">
        <div class="case-detail-meta">
          <div>
            <div class="case-detail-opp">${escapeHtml(c.opponent)}</div>
            ${statusPill}
          </div>
          <div class="case-detail-amount">${formatNOK(c.amount)}</div>
        </div>
        <div class="case-detail-title">${escapeHtml(c.title)}</div>
        ${calloutHtml}
      </div>

      ${actionsHtml}

      <div class="timeline">
        <div class="timeline-section-head">
          <span>Saksgang</span>
          ${c.sentLetter ? `<button class="legal-link" style="padding:0;font-size:11px" data-action="view-sent-letter" data-id="${c.id}">Se klagen</button>` : ''}
        </div>
        <div class="timeline-list">
          ${timelineEventsHtml}
          ${futureEventsHtml}
        </div>
      </div>

      ${(c.status === 'active' || c.status === 'needs_decision' || c.status === 'resolved') && c.sentLetter ? `
        <div style="padding: 0 28px 8px;">
          <button class="btn btn-secondary" data-action="show-comm-history" data-id="${c.id}">
            <svg width="16" height="16" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            Se all kommunikasjon
          </button>
        </div>
      ` : ''}

      ${(c.status === 'active' || c.status === 'needs_decision') ? `
        <div class="case-stop-area">
          <button data-action="stop-case" data-id="${c.id}">Stopp saken</button>
        </div>
      ` : ''}
    `;
  },

  // ============================================================
  // RESPONSE (motpart har svart)
  // ============================================================
  response(params) {
    const c = getCase(params.caseId);
    if (!c || !c.response) return screens.home();
    const r = c.response;

    return `
      <div class="app-header">
        <button class="nav-back" data-action="back" aria-label="Tilbake">
          <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
      </div>

      <div class="response-banner ${r.classification === 'accepted' ? 'win' : ''}">
        <div class="response-banner-eyebrow">${formatDate(r.receivedAt)} · ${escapeHtml(c.opponent.split(' ')[0])}</div>
        <div class="response-banner-text">${
          r.classification === 'accepted'
            ? 'De ga deg <em>medhold.</em>'
            : 'De avviste klagen. <em>Vi mener avslaget er svakt begrunnet.</em>'
        }</div>
      </div>

      <div class="their-quote">
        <div class="their-quote-label">Slik svarer de</div>
        <div class="their-quote-body">"${escapeHtml(r.quote)}"</div>
        <div class="their-quote-attr">Utdrag · ${formatDate(r.receivedAt, { long: true })}</div>
      </div>

      <div class="our-analysis">
        <div class="analysis-head">
          <div class="analysis-head-icon" aria-hidden="true">M</div>
          <div class="analysis-head-text">Vår vurdering</div>
        </div>
        ${r.analysis.map(p => `<p>${p}</p>`).join('')}
      </div>

      <div class="recommendation-actions">
        ${r.classification === 'accepted'
          ? `<button class="btn btn-primary" data-action="close-as-won" data-id="${c.id}">Avslutt saken</button>`
          : `<button class="btn btn-primary" data-action="show-nba" data-id="${c.id}">Se hva vi kan gjøre videre</button>
             <button class="btn btn-secondary" data-action="accept-and-pay" data-id="${c.id}">Nei, jeg betaler</button>`
        }
      </div>
    `;
  },

  // ============================================================
  // NBA — Next best action
  // ============================================================
  nba(params) {
    const c = getCase(params.caseId);
    if (!c) return screens.home();
    const ct = CASE_TYPES[c.type];

    return `
      <div class="app-header">
        <button class="nav-back" data-action="back" aria-label="Tilbake">
          <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
      </div>

      <div class="nba-hero">
        <div class="eyebrow" style="margin-bottom: 12px;">Neste steg</div>
        <h2 class="display">Hva vil du <em>gjøre nå?</em></h2>
        <p class="body" style="margin-top: 14px;">Tre veier videre. Vi har skrevet alt klart for hver av dem.</p>
      </div>

      <div class="nba-options stagger">
        <button class="nba-option recommended" data-action="escalate" data-id="${c.id}">
          <div class="nba-option-badge">Anbefalt</div>
          <div class="nba-option-title">Eskaler til ${escapeHtml(ct.escalationOrg)}</div>
          <div class="nba-option-meta">Klage er ferdig skrevet</div>
          <div class="nba-option-desc">Uavhengig nemnd vurderer saken på nytt. ${escapeHtml(c.opponent.split(' ')[0])} kan ikke ilegge ekstra gebyr mens saken er der.</div>
          <div class="nba-stats">
            <div class="nba-stat">
              <div class="nba-stat-label">Medholdsrate</div>
              <div class="nba-stat-value">${ct.medholdRate}</div>
            </div>
            <div class="nba-stat">
              <div class="nba-stat-label">Kostnad</div>
              <div class="nba-stat-value">0 kr</div>
            </div>
            <div class="nba-stat">
              <div class="nba-stat-label">Tid</div>
              <div class="nba-stat-value">${ct.responseTimeRange}</div>
            </div>
          </div>
        </button>

        <button class="nba-option" data-action="upload-more" data-id="${c.id}">
          <div class="nba-option-title">Last opp ny dokumentasjon</div>
          <div class="nba-option-meta">Hvis du har bilder eller bevis</div>
          <div class="nba-option-desc">Bilder, kvittering eller andre bevis kan styrke en ny runde med ${escapeHtml(c.opponent.split(' ')[0])} først.</div>
        </button>

        <button class="nba-option" data-action="accept-and-pay" data-id="${c.id}">
          <div class="nba-option-title">Aksepter og betal</div>
          <div class="nba-option-meta">Avslutter saken</div>
          <div class="nba-option-desc">Du betaler ${formatNOK(c.amount)} direkte til ${escapeHtml(c.opponent.split(' ')[0])}. Saken arkiveres.</div>
        </button>
      </div>

      <div style="padding: 24px 28px;">
        <button class="btn btn-primary" data-action="escalate" data-id="${c.id}">Send eskaleringsklagen
          <svg width="16" height="16" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </button>
      </div>
    `;
  },

  // ============================================================
  // RESOLVED
  // ============================================================
  resolved(params) {
    const c = getCase(params.caseId);
    if (!c) return screens.home();

    const outcome = c.resolvedOutcome || 'won';
    const isWin = outcome === 'won';
    const isPaid = outcome === 'paid';
    const isLost = outcome === 'lost';

    let headline, eyebrow, body, markIcon;
    if (isWin) {
      eyebrow = '<div class="resolved-eyebrow won">Du fikk medhold</div>';
      headline = `<h1 class="resolved-headline">${c.type === 'parking' ? 'Boten' : 'Kravet'} <em>er frafalt.</em></h1>`;
      body = `<p class="resolved-body">${escapeHtml(c.opponent)} kan ikke kreve betaling for denne saken. Saken er lukket og arkivert.</p>`;
      markIcon = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;
    } else if (isPaid) {
      eyebrow = '<div class="resolved-eyebrow paid">Saken er betalt</div>';
      headline = `<h1 class="resolved-headline">Saken er <em>avsluttet.</em></h1>`;
      body = `<p class="resolved-body">Du valgte å betale ${formatNOK(c.amount)}. Vi har lukket saken — du kan finne den i arkivet.</p>`;
      markIcon = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;
    } else {
      eyebrow = '<div class="resolved-eyebrow lost">Sak avsluttet</div>';
      headline = `<h1 class="resolved-headline">Saken <em>nådde ikke fram.</em></h1>`;
      body = `<p class="resolved-body">${escapeHtml(c.opponent)} fikk medhold. Saken er lukket og arkivert.</p>`;
      markIcon = `<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
    }

    return `
      <div class="app-header">
        <button class="nav-back" data-action="back-to-home" aria-label="Tilbake">
          <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
      </div>

      <div class="resolved-wrap">
        <div class="resolved-mark ${isPaid ? 'paid' : isLost ? 'lost' : ''}" aria-hidden="true">
          ${markIcon}
        </div>

        ${eyebrow}
        ${headline}
        ${body}

        ${isWin ? `
          <div class="resolved-celebration">
            <div class="resolved-celebration-amount">+ ${formatNOK(c.amount)}</div>
            <div class="resolved-celebration-text">Det tok deg ~5 minutter å vinne ${formatNOK(c.amount)} — og du gjorde det riktig.</div>
          </div>
        ` : ''}

        <div class="resolved-summary">
          <div class="resolved-summary-row">
            <div class="resolved-summary-label">Opprinnelig krav</div>
            <div class="resolved-summary-value">${formatNOK(c.amount)}</div>
          </div>
          <div class="resolved-summary-row">
            <div class="resolved-summary-label">Sakstid</div>
            <div class="resolved-summary-value">${Math.max(1, Math.floor((new Date(c.updatedAt) - new Date(c.createdAt)) / (1000 * 60 * 60 * 24)))} dag${Math.floor((new Date(c.updatedAt) - new Date(c.createdAt)) / (1000 * 60 * 60 * 24)) === 1 ? '' : 'er'}</div>
          </div>
          <div class="resolved-summary-row">
            <div class="resolved-summary-label">Utfall</div>
            <div class="resolved-summary-value">${isWin ? 'Medhold' : isPaid ? 'Betalt' : 'Avsluttet'}</div>
          </div>
        </div>

        <div class="feedback-prompt">
          <div class="feedback-q">Hvordan var opplevelsen?</div>
          <div class="rating-stars" id="rating-stars" role="radiogroup" aria-label="Vurdering">
            ${[1,2,3,4,5].map(i => `
              <button class="rating-star" data-rating="${i}" role="radio" aria-checked="false" aria-label="${i} av 5 stjerner">
                <svg viewBox="0 0 24 24" aria-hidden="true"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              </button>
            `).join('')}
          </div>
        </div>

        <button class="btn btn-primary" data-action="back-to-home">Tilbake til oversikten</button>
      </div>
    `;
  },

  resolved_mount(params, screen) {
    const stars = screen.querySelectorAll('.rating-star');
    stars.forEach(star => {
      star.addEventListener('click', () => {
        const rating = parseInt(star.dataset.rating);
        stars.forEach((s, i) => {
          s.classList.toggle('filled', i < rating);
          s.setAttribute('aria-checked', i < rating ? 'true' : 'false');
        });
        showToast('Takk for tilbakemeldingen');
      });
    });
  },

  // ============================================================
  // PROFILE
  // ============================================================
  profile() {
    if (!state.user) return screens.home();
    const u = state.user;
    return `
      <div class="app-header">
        <button class="nav-back" data-action="back" aria-label="Tilbake">
          <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
      </div>

      <div class="profile-hero">
        <div class="profile-avatar-large">${getInitials(u.name)}</div>
        <div class="profile-name">${escapeHtml(u.name)}</div>
        <div class="profile-email">${escapeHtml(u.email)}</div>
      </div>

      <div class="profile-section">
        <h3>Mine fakta</h3>
        <p class="body-s" style="margin-bottom: 12px; line-height: 1.5;">Disse opplysningene fyller vi inn automatisk når vi skriver klager på dine vegne.</p>

        <div class="fact-row" data-action="edit-fact" data-field="name">
          <div class="label">Fullt navn</div>
          <div class="value">
            <span>${escapeHtml(u.name)}</span>
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>

function caseCardHtml(c, isAttention = false) {
  const ct = CASE_TYPES[c.type] || {};
  let nextText = '';
  let amountClass = '';

  if (c.status === 'needs_decision') {
    nextText = 'Krever din beslutning';
  } else if (c.status === 'high_risk') {
    const days = daysBetween(c.deadline);
    nextText = days < 0 ? 'Frist utløpt' : `${days} dag${days === 1 ? '' : 'er'} igjen`;
  } else if (c.status === 'active') {
    nextText = `Venter på ${escapeHtml(c.opponent.split(' ')[0])}`;
  } else if (c.status === 'awaiting_approval' || c.status === 'draft') {
    nextText = 'Klagen er klar';
  } else if (c.status === 'resolved' && c.resolvedOutcome === 'won') {
    nextText = `Du fikk medhold · ${formatDate(c.updatedAt)}`;
  } else if (c.status === 'resolved' && c.resolvedOutcome === 'paid') {
    nextText = `Betalt · ${formatDate(c.updatedAt)}`;
    amountClass = 'struck';
  } else if (c.status === 'closed') {
    nextText = `Avsluttet · ${formatDate(c.updatedAt)}`;
  }

  return `
    <button class="case-card ${isAttention ? 'attention' : ''}" data-action="open-case" data-id="${c.id}">
      <div class="case-top">
        <div class="case-opponent">${escapeHtml(c.opponent.split(' ')[0])}</div>
        <div class="case-amount ${amountClass}">${formatNOK(c.amount)}</div>
      </div>
      <div class="case-title">${escapeHtml(c.title)}</div>
      <div class="case-status-row">
        ${getStatusPill(c)}
        <span class="case-next">${nextText}</span>
      </div>
    </button>
  `;
}

function editableFieldRow(name, label, value, extraClass = '', confidence = 'high') {
  const isEditable = !['issuedDate', 'deadline', 'type'].includes(name);

function getStatusPill(c) {
  if (c.status === 'needs_decision') return `<span class="status-pill attention"><span class="status-dot pulse"></span>Krever beslutning</span>`;
  if (c.status === 'high_risk') return `<span class="status-pill warn"><span class="status-dot"></span>Frist utløpt</span>`;
  if (c.status === 'active') return `<span class="status-pill active"><span class="status-dot pulse"></span>Aktiv</span>`;
  if (c.status === 'awaiting_approval') return `<span class="status-pill draft">Venter godkjenning</span>`;
  if (c.status === 'draft') return `<span class="status-pill draft">Utkast</span>`;
  if (c.status === 'resolved' && c.resolvedOutcome === 'won') return `<span class="status-pill resolved">Medhold</span>`;
  if (c.status === 'resolved' && c.resolvedOutcome === 'paid') return `<span class="status-pill paid">Betalt</span>`;
  if (c.status === 'resolved') return `<span class="status-pill lost">Avsluttet</span>`;
  if (c.status === 'closed') return `<span class="status-pill lost">Lukket</span>`;
  return `<span class="status-pill">${escapeHtml(c.status)}</span>`;
}

function updateFieldValue(caseId, fieldName, newValue) {
  const c = getCase(caseId);
  if (!c) return;
  if (fieldName === 'amount') {
    const num = parseInt(newValue.replace(/[^\d]/g, ''), 10);
    if (!isNaN(num)) c.amount = num;
  } else {
    c[fieldName] = newValue;
  }
  // Set this field's confidence to high (user has confirmed)
  if (!c.fieldConfidence) c.fieldConfidence = {};
  c.fieldConfidence[fieldName] = 'high';
  c.updatedAt = new Date().toISOString();
  saveState();
  showToast('Feltet er oppdatert');
}

// PIPELINE RUNNERS
// ============================================================

async function startNewCaseFromFile(file, dataUrl) {
  // Pick a scenario for the upload (since we don't have real OCR)
  const scenarios = ['parking_strong', 'parking_weak', 'invoice_strong'];
  const scenarioKey = scenarios[Math.floor(Math.random() * scenarios.length)];
  router.replace('analysis', { scenarioKey, file, documentImage: dataUrl });
}

async function runAnalysisPipeline(scenarioKey, file, documentImage, screen) {
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const stepDelay = reduced ? 100 : 750;

  // Step 0 → 1
  await new Promise(r => setTimeout(r, stepDelay));
  setAnalysisStep(screen, 0, 'done');
  setAnalysisStep(screen, 1, 'active');

  // Step 1 → 2
  await new Promise(r => setTimeout(r, stepDelay));
  setAnalysisStep(screen, 1, 'done');
  setAnalysisStep(screen, 2, 'active');

  // Step 2 → 3
  await new Promise(r => setTimeout(r, stepDelay * 1.2));
  setAnalysisStep(screen, 2, 'done');
  setAnalysisStep(screen, 3, 'active');

  // Run the actual analysis
  const result = await analyzeDocument(file, scenarioKey);
  if (result.error) {
    router.replace('ocr_failed');
    return;
  }

  await new Promise(r => setTimeout(r, stepDelay));
  setAnalysisStep(screen, 3, 'done');

  await new Promise(r => setTimeout(r, reduced ? 50 : 300));

  // Create case and route to confirm
  const newCase = createCaseFromAnalysis(result, documentImage);
  router.replace('confirm', { caseId: newCase.id });
}

function setAnalysisStep(screen, idx, status) {
  const step = screen.querySelector(`[data-step="${idx}"]`);
  if (step) {
    step.classList.remove('active', 'done');
    if (status) step.classList.add(status);
  }
}

function formatFileSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function maskPersonnummer(pn) {
  if (!pn || pn.length < 6) return pn;
  return pn.substring(0, 6) + ' ' + '•'.repeat(Math.max(0, pn.length - 6));
}

function stripHtml(html) {
  return String(html).replace(/<[^>]*>/g, '');
}

function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    return navigator.clipboard.writeText(text).then(() => true).catch(() => false);
  }
  // Fallback
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return Promise.resolve(ok);
  } catch (e) {
    return Promise.resolve(false);
  }
}

function hapticFeedback(intensity = 'light') {
  if (!navigator.vibrate) return;
  if (intensity === 'light') navigator.vibrate(10);
  else if (intensity === 'medium') navigator.vibrate(20);
  else if (intensity === 'heavy') navigator.vibrate([30, 20, 30]);
}

function getAllNotifications() {
  // Build notifications from all timeline events across cases
  const notifs = [];
  state.cases.forEach(c => {
    c.timeline.forEach((ev, idx) => {
      // Only include events worth notifying about
      if (ev.type === 'system' && idx === 0) return; // Skip "Sak opprettet"
      const notifId = `${c.id}_${idx}`;
      notifs.push({
        id: notifId,
        caseId: c.id,
        date: ev.date,
        title: ev.title,
        detail: ev.detail || '',
        opponentShort: c.opponent.split(' ')[0],
        read: state.readNotifications && state.readNotifications.includes(notifId)
      });
    });
  });
  return notifs.sort((a, b) => new Date(b.date) - new Date(a.date));
}

function getUnreadNotifications() {
  return getAllNotifications().filter(n => !n.read);
}

function markNotificationRead(id) {
  if (!state.readNotifications) state.readNotifications = [];
  if (!state.readNotifications.includes(id)) {
    state.readNotifications.push(id);
    saveState();
  }
}

function markAllNotificationsRead() {
  const all = getAllNotifications();
  state.readNotifications = all.map(n => n.id);
  saveState();
}

function groupNotificationsByDate(notifs) {
  const groups = {};
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yesterday = new Date(today.getTime() - 24*60*60*1000);
  const weekAgo = new Date(today.getTime() - 7*24*60*60*1000);

  notifs.forEach(n => {
    const d = new Date(n.date);
    let key;
    if (d >= today) key = 'I dag';
    else if (d >= yesterday) key = 'I går';
    else if (d >= weekAgo) key = 'Siste uke';
    else key = 'Tidligere';

    if (!groups[key]) groups[key] = [];
    groups[key].push(n);
  });

  const order = ['I dag', 'I går', 'Siste uke', 'Tidligere'];
  return order.filter(k => groups[k]).map(k => ({ label: k, items: groups[k] }));
}

// ============================================================

function setupPullToRefresh(screen) {
  const indicator = screen.querySelector('#ptr-indicator');
  if (!indicator) return;

  let startY = 0, currentY = 0, pulling = false, refreshing = false;
  const threshold = 70;
  const maxPull = 100;

  screen.addEventListener('touchstart', e => {
    if (refreshing) return;
    if (screen.scrollTop > 0) return;
    if (e.touches.length !== 1) return;
    startY = e.touches[0].clientY;
    pulling = true;
    indicator.classList.add('pulling');
  }, { passive: true });

  screen.addEventListener('touchmove', e => {
    if (!pulling || refreshing) return;
    currentY = e.touches[0].clientY;
    const dy = currentY - startY;
    if (dy <= 0) {
      indicator.style.transform = 'translateX(-50%) translateY(-100%)';
      indicator.classList.remove('ready');
      return;
    }
    const pull = Math.min(dy * 0.5, maxPull);
    indicator.style.transform = `translateX(-50%) translateY(${pull - 36}px)`;
    if (dy > threshold) indicator.classList.add('ready');
    else indicator.classList.remove('ready');
  }, { passive: true });

  screen.addEventListener('touchend', () => {
    if (!pulling || refreshing) return;
    pulling = false;
    indicator.classList.remove('pulling');

    const isReady = indicator.classList.contains('ready');
    if (isReady) {
      // Trigger refresh
      refreshing = true;
      indicator.classList.add('refreshing');
      indicator.classList.remove('ready');
      indicator.querySelector('.ptr-arrow').outerHTML = '<div class="ptr-spinner"></div>';
      hapticFeedback('light');

      // Simulate refresh delay (in production: refetch state)
      setTimeout(() => {
        // Re-render home with current filter
        const currentFilter = router.currentScreen?.params?.filter || 'all';
        router.replace('home', { filter: currentFilter });
        showToast('Oppdatert');
      }, 800);
    } else {
      indicator.style.transform = 'translateX(-50%) translateY(-100%)';
    }
  }, { passive: true });
}

function updateFabVisibility(screenName) {

// Hide FAB on scroll-down, show on scroll-up
let lastScrollY = 0;
let scrollListenerAttached = false;

function attachScrollListener() {
  if (scrollListenerAttached) return;
  scrollListenerAttached = true;

  const router = document.getElementById('router');
  router.addEventListener('scroll', e => {
    const fab = document.getElementById('fab');
    if (!fab || fab.classList.contains('hidden')) return;
    const screen = e.target.closest('.screen');
    if (!screen) return;
    const sy = screen.scrollTop;
    if (sy > lastScrollY + 8 && sy > 100) {
      fab.style.opacity = '0';
      fab.style.transform = 'translateY(20px) scale(0.9)';
      fab.style.pointerEvents = 'none';
    } else if (sy < lastScrollY - 8 || sy < 50) {
      fab.style.opacity = '';
      fab.style.transform = '';
      fab.style.pointerEvents = '';
    }
    lastScrollY = sy;
  }, true);
}

function showCommHistoryModal(caseId) {
  const c = getCase(caseId);
  if (!c) return;

  const items = [];

  // Outgoing: original complaint
  if (c.sentLetter) {
    const sentEv = c.timeline.find(e => e.viewSentLetter);
    items.push({
      direction: 'outgoing',
      time: sentEv ? sentEv.date : c.updatedAt,
      subject: c.sentLetter.subject + ' — ' + c.sentLetter.reference,
      preview: c.sentLetter.summary || (c.sentLetter.paragraphs[0] || ''),
      type: 'complaint',
      action: 'view-sent'
    });
  }

  // Incoming: opponent response
  if (c.response) {
    items.push({
      direction: 'incoming',
      time: c.response.receivedAt,
      subject: 'Svar på klage — ' + c.reference,
      preview: c.response.quote,
      type: 'response',
      action: 'view-response'
    });
  }

  // Outgoing: escalation
  const escalationEv = c.timeline.find(e => e.title && e.title.includes('Eskalert'));
  if (escalationEv) {
    items.push({
      direction: 'outgoing',
      time: escalationEv.date,
      subject: 'Klage videresendt til klagenemnd — ' + c.reference,
      preview: 'Saken er videresendt til uavhengig nemnd for vurdering.',
      type: 'escalation',
      action: 'view-escalation'
    });
  }

  items.sort((a, b) => new Date(a.time) - new Date(b.time));

  showModal(`
    <h3>All kommunikasjon</h3>
    <p style="font-size: 13px; color: var(--ink-muted); margin-bottom: 8px;">Alt vi har sendt og mottatt på vegne av deg i denne saken.</p>

    <div class="comm-list">
      ${items.length === 0 ? '<p style="text-align: center; padding: 24px 0; color: var(--ink-muted); font-size: 14px;">Ingen kommunikasjon ennå</p>' : items.map(item => `
        <div class="comm-item ${item.direction}">
          <div class="comm-item-meta">
            <div class="comm-item-direction">${item.direction === 'outgoing' ? '→ Sendt' : '← Mottatt'}</div>
            <div class="comm-item-time">${formatDate(item.time, { long: true })} · ${formatTime(item.time)}</div>
          </div>
          <div class="comm-item-subject">${escapeHtml(item.subject)}</div>
          <div class="comm-item-preview">${escapeHtml(item.preview)}</div>
          ${item.type === 'complaint' ? `<button class="comm-item-action" onclick="closeModal(); setTimeout(() => showSentLetterModal('${c.id}'), 300);">Les hele klagen →</button>` : ''}
          ${item.type === 'response' ? `<button class="comm-item-action" onclick="closeModal(); router.push('response', { caseId: '${c.id}' });">Se vår analyse →</button>` : ''}
        </div>
      `).join('')}
    </div>

    <div class="modal-actions" style="margin-top: 20px;">
      <button class="btn btn-secondary" onclick="closeModal()">Lukk</button>
    </div>
  `);
}

function showModal(html) {
  const modal = document.getElementById('modal');
  const content = document.getElementById('modal-content');
  content.innerHTML = `<div class="modal-handle" aria-hidden="true"></div>${html}`;
  modal.classList.add('show');
  modal.setAttribute('aria-hidden', 'false');
  // Allow tap on backdrop to close
  modal.onclick = (e) => { if (e.target === modal) closeModal(); };
}

function closeModal() {
  const modal = document.getElementById('modal');
  modal.classList.remove('show');
  modal.setAttribute('aria-hidden', 'true');
  modal.onclick = null;
}
